document.getElementById('content').innerHTML=marked.parse('# Alphabet Inc (GOOGL) — Investment Thesis\n\n**Status:** OWNED (₹50,000 invested | ~1.9 shares at ~$308.7 | US portfolio)\n**Quality Score:** 23/25 (Grade A: High Conviction)\n**Last Updated:** 2026-03-12\n**Data Source:** yfinance | Currency: USD (₹85/USD assumed)\n\n---\n\n## 1. Business Summary\n\nAlphabet is the parent of Google — the world\'s dominant search engine (90%+ market share), YouTube (2nd largest search), Google Cloud (3rd in cloud behind AWS/Azure and growing), Android (70%+ mobile OS share), and a portfolio of moonshot bets (Waymo, DeepMind).\n\nThe core business is **advertising on intent-based search** — when someone searches "best running shoes", Google shows ads to people who are actively looking to buy. This is the highest-quality advertising format ever created. Revenue: $402.8B TTM.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 5 | Search monopoly (90%+ share), switching cost = years of trained behavior. YouTube\'s creator ecosystem is a flywheel. Android lock-in on mobile. Google Cloud growing at 28%+. Multiple moats. |\n| Management | 4 | Sundar Pichai strong operator. Sergey/Larry still on board as founders. AI pivot (Gemini) is well-executed. Buybacks: aggressive ($70B+ program). Minor ding for antitrust overhang. |\n| Financials | 5 | ROE 35.7%, net margin 32.8%, FCF $38.1B, zero net debt. Operating margin 31.6%. Revenue $402B. The financial profile is exceptional. |\n| Growth Runway | 4 | Search growth moderating (still 18% YoY) but Cloud at 28%+, YouTube ads recovering. AI integration (Gemini in search) is next growth driver. Regulatory risk caps score. |\n| Valuation | 5 | P/E 28.6x, forward P/E 23x. For a 31% earnings growth company with $38B FCF, this is **cheap**. PEG = 28.6/31.1 = 0.92x — below 1, meaning you\'re paying less than 1x for each % of growth. One of the best risk/reward in mega-cap tech. |\n| **Total** | **23/25** | **Grade A: High Conviction** |\n\n---\n\n## 3. Business Segments\n\n| Segment | Revenue (TTM est.) | Growth | Margin | Notes |\n|---------|-------------------|--------|--------|-------|\n| Google Search + Other | ~$245B | 12-15% | ~35% | Core moat. AI search not yet cannibalizing. |\n| YouTube Ads | ~$35B | 10-15% | ~30% | Connected TV growth accelerating |\n| Google Network | ~$30B | Flat | ~20% | Legacy programmatic |\n| Google Cloud | ~$45B | 28%+ | ~12% (improving) | Key growth driver. Approaching profitability inflection. |\n| Other Bets (Waymo, etc.) | ~$1B | — | Loss | Long-term optionality |\n| Subscriptions + Devices | ~$15B | 20%+ | ~25% | YouTube Premium, Google One, Pixel |\n\n**The Cloud story:** Google Cloud crossed $45B ARR and its operating margin is expanding rapidly. Every 1% margin improvement at $45B = $450M extra profit. By FY27-28, Cloud alone could contribute $8-10B in operating profit — a massive earnings driver not priced in.\n\n---\n\n## 4. Key Metrics\n\n| Metric | Value | Notes |\n|--------|-------|-------|\n| Price | $308.7 | Your entry (₹50k ≈ 1.9 shares) |\n| 52-week range | $140.53 – $349.00 | Down 11.5% from high |\n| Market Cap | $3.73 Trillion | |\n| Revenue (TTM) | $402.8B | |\n| Revenue Growth | 18% YoY | |\n| Earnings Growth | 31.1% YoY | Faster than revenue — operating leverage |\n| Net Margin | 32.8% | |\n| Operating Margin | 31.6% | |\n| ROE | 35.7% | Exceptional |\n| FCF | $38.1B | ~10% FCF yield at market cap |\n| D/E | 16.1x | Cash-rich — this is mostly operating lease; net debt is negative |\n| P/E (TTM) | 28.6x | |\n| Forward P/E | 23x | |\n| P/B | 9x | |\n\n---\n\n## 5. Valuation\n\n### Why GOOGL at 28x P/E is cheap:\n\nRule of thumb: P/E should roughly equal growth rate (PEG = 1). GOOGL growing earnings at 31% trading at 28x P/E = PEG of 0.92 = you\'re getting growth at a discount.\n\nCompare to S&P 500 average P/E ~22x with 8-10% earnings growth. GOOGL has 3x the growth at 1.3x the P/E.\n\n### Scenario Analysis (3 Years — FY28E)\n\n| Scenario | EPS FY28 | P/E Exit | Price | Return from $308.7 |\n|----------|---------|---------|-------|---------------------|\n| Bear | $17 (15% CAGR) | 18x | $306 | ~0% |\n| Base | $22 (25% CAGR) | 22x | $484 | **+57%** |\n| Bull | $28 (32% CAGR) | 28x | $784 | **+154%** |\n\nFY25 EPS was ~$10.8 (implied from P/E 28.6 × $308.7). At 25% CAGR to FY28: $10.8 × 1.25³ = $21.1\n\n### What makes this a potential multi-bagger?\n\nAt current price, cloud inflection + AI search monetization + buybacks could push EPS significantly above base case. Google has bought back $70B+ shares in FY25, reducing share count ~4-5% annually — this is a permanent EPS tailwind.\n\n**At bull case + buyback effect:** $784 in 3 years = 2.5x. Not a 10x, but in USD terms for a blue-chip, exceptional.\n\n**INR context:** If INR depreciates vs USD (historically 3-4%/year), INR return = USD return + FX gain. ₹50k today → ₹1.27L at base case in 3 years if USD/INR goes to ₹95.\n\n---\n\n## 6. Risks\n\n| Risk | Probability | Impact | Notes |\n|------|-------------|--------|-------|\n| AI disrupts search (ChatGPT, Perplexity) | Medium | HIGH | Biggest existential risk. Google is fighting back with Gemini but this is the one to watch. |\n| Antitrust breakup (DOJ case) | Medium | Medium | US DOJ has ongoing case. Worst case = forced divestiture of Chrome/Android. Timeline: 2-4 years. |\n| YouTube ad pressure | Low | Medium | TV ad dollars are shifting digital — YouTube benefits more than loses |\n| Cloud competition (AWS, Azure dominant) | Low | Medium | Google Cloud growing but #3 position makes enterprise sales harder |\n| Regulatory (EU, India) | Medium | Low-Medium | GDPR fines, India CCI — material but not existential |\n\n---\n\n## 7. Currency Risk (India-specific)\n\nYou\'re investing INR into a USD asset. ₹85/USD today:\n- If INR strengthens to ₹75/USD: Your USD gain reduced by ~11% in INR terms\n- If INR weakens to ₹95/USD (historical trend): Your USD gain boosted by ~11% in INR terms\n\nHistorically INR has depreciated ~3-4% annually vs USD. This is a tailwind for Indian investors in US stocks.\n\n---\n\n## 8. Exit Triggers\n\n- [ ] Search market share drops below 85% for 2 consecutive quarters (AI disruption becoming real)\n- [ ] Google Cloud growth decelerates below 15% (thesis breaks)\n- [ ] DOJ antitrust ruling orders breakup (reassess immediately)\n- [ ] ROE drops below 20% (operating model degrading)\n- [ ] Better opportunity with same capital\n\n---\n\n## 9. Decision History\n\n| Date | Action | Price | Quantity | INR |\n|------|--------|-------|----------|-----|\n| Mar 2026 | BUY | ~$308.7 | ~1.9 shares | ₹50,000 |\n\n---\n\n## 10. Research Log\n\n### 2026-03-12 — Initial thesis\n- GOOGL is the highest-conviction US position. P/E 28.6x for 31% EPS growth = PEG 0.92 = cheap.\n- Cloud is the hidden earnings driver — approaching profitability inflection at $45B ARR\n- AI risk is real but Google is fighting back with Gemini, which is integrated into search\n- Buybacks of $70B+ annually create permanent per-share value\n- Currency: INR depreciation historically tailwind for India-based USD investors\n- Grade A: 23/25. Would add more if price drops to $260-280 range (20% discount to current)\n');
