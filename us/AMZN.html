his is undervalued. |\n| **Total** | **21/25** | **Grade A: High Conviction** |\n\n---\n\n## 3. The Real Amazon: Segment Breakdown\n\n| Segment | Revenue (TTM est.) | Growth | Op. Margin | Op. Profit |\n|---------|-------------------|--------|------------|-----------|\n| AWS | ~$105B | 17-20% | ~31% | ~$32B |\n| Advertising Services | ~$60B | 20%+ | ~50% | ~$30B |\n| North America Retail | ~$390B | 8-10% | ~6% | ~$23B |\n| International Retail | ~$140B | 10%+ | ~2% | ~$3B |\n| Subscriptions (Prime) | ~$45B | 12% | ~25% | ~$11B |\n\n**Key insight:** AWS + Ads = ~$165B revenue but generate ~$62B operating profit = **38% of revenue at 38% margin**. The retail business at $530B generates ~$26B = only 5% margin. As AWS and Ads grow faster than retail, Amazon\'s blended margin will expand significantly. Earnings growth (EPS) will far outpace revenue growth.\n\nThis is the "Amazon margin expansion story" — the market has been waiting for it for 10 years and it\'s now happening (earnings growth 5% sounds slow but look at EPS expansion over 2 years: nearly 3x).\n\n---\n\n## 4. Key Metrics\n\n| Metric | Value | Notes |\n|--------|-------|-------|\n| Price | $212.65 | Your entry (₹50k ≈ 2.77 shares) |\n| 52-week range | $161.38 – $258.60 | Down 17.8% from high |\n| Market Cap | $2.28 Trillion | |\n| Revenue (TTM) | $716.9B | Largest revenue among FAANG |\n| Revenue Growth | 13.6% YoY | Understates profit growth |\n| Earnings Growth | 5% YoY | Misleading — 2-year EPS is up 200%+ |\n| Net Margin | 10.8% | Expanding as AWS/Ads mix improves |\n| Operating Margin | 10.5% | Will reach 15-20% by FY27-28 |\n| ROE | 22.3% | Growing |\n| FCF | $23.8B | |\n| P/E (TTM) | 29.7x | |\n| Forward P/E | 22.8x | |\n\n---\n\n## 5. Valuation\n\n### Segment-Based Sum-of-Parts (FY28E)\n\n| Segment | Revenue FY28E | Margin | Operating Profit | Multiple | Value |\n|---------|--------------|--------|-----------------|---------|-------|\n| AWS | $165B | 33% | $54B | 25x EV/EBITDA | $1.35T |\n| Advertising | $85B | 50% | $42B | 20x | $840B |\n| Retail (NA+Intl) | $620B | 7% | $43B | 15x | $645B |\n| Subscriptions | $65B | 25% | $16B | 20x | $320B |\n| **Total EV** | | | | | **$3.16T** |\n| Less: Net Debt | | | | | -$50B |\n| **Equity Value** | | | | | **~$3.1T** |\n| **Per Share** | | | | | **~$290** |\n| vs Current $212.65 | | | | | **+36% upside** |\n\n**Bull case:** AWS reaches 22-25% of revenue at higher margins + international retail turns profitable → $380/share (+79%)\n\n### Reverse DCF: What\'s Priced In?\nAt $212.65 with forward P/E 22.8x: Market is pricing in ~15-18% EPS CAGR for 5 years. Given AWS growing 20%+ and ads growing 20%+, this is achievable — potentially conservative.\n\n---\n\n## 6. Risks\n\n| Risk | Probability | Impact | Notes |\n|------|-------------|--------|-------|\n| AWS growth decelerates (Azure gaining) | Medium | HIGH | Microsoft Copilot + Azure is strong competitor. Google Cloud also fighting. |\n| AI makes retail search irrelevant | Low | Medium | But Amazon ads are on product pages — different intent signal than Google |\n| Labour/unionization costs rising | Medium | Low-Medium | Operating cost pressure on retail |\n| Antitrust (FTC) breakup of AWS or retail | Low | HIGH | Would actually unlock massive value if separated |\n| International expansion losses | Low | Low | China exit done; India/Middle East are profitable paths |\n\n---\n\n## 7. Exit Triggers\n\n- [ ] AWS growth drops below 12% for 2 quarters (cloud share loss)\n- [ ] Operating margin expansion reverses — blended margin falls below 8%\n- [ ] Advertising revenue growth drops below 10% (search intent risk)\n- [ ] Better capital allocation opportunity\n\n---\n\n## 8. Decision History\n\n| Date | Action | Price | Quantity | INR |\n|------|--------|-------|----------|-----|\n| Mar 2026 | BUY | ~$212.65 | ~2.77 shares | ₹50,000 |\n\n---\n\n## 9. Research Log\n\n### 2026-03-12 — Initial thesis\n- Amazon is an AWS + Advertising company that also runs the world\'s largest retailer. The retail drags reported margins — the high-margin segments are underappreciated.\n- Forward P/E 22.8x is cheap for a company where the highest-growth segments (AWS 20%, Ads 20%) will drive EPS 25%+ annually.\n- Sum-of-parts suggests $290/share fair value vs $212.65 current — 36% upside at conservative multiples.\n- Stock is 17.8% off 52-week high — reasonable entry. Would add at $180-190 (another 10-15% down).\n- Currency: Same as GOOGL — INR depreciation is historically a tailwind.\n- Grade A: 21/25. Financials score 3 (not 4) because retail margin drag is real.\n');
