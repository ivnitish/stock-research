document.getElementById('content').innerHTML=marked.parse("# EPACK Prefab Technologies (EPACKPEB.NS) — Investment Thesis\n\n**Status:** OWNED (451 shares, ₹1.03L invested, 10% of portfolio)\n**Quality Score:** 17/25 (Grade B: Moderate Conviction)\n**Last Updated:** 2026-03-11\n**Data Source:** Screener.in (consolidated)\n\n---\n\n## 1. Business Summary\n\nIndia's leading pre-engineered steel building (PEB) and modular structure manufacturer. Serves industrial, commercial, and infrastructure segments. End-to-end capabilities: design, fabrication, and erection. The thesis is India's massive infrastructure and industrial capex cycle creating sustained demand for PEB solutions, which are faster, cheaper, and more sustainable than conventional construction.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 3 | PEB is competitive — many players (Interarch, Zamil, Kirby). EPACK differentiates via modular solutions and end-to-end capability. Not a strong structural moat. |\n| Management | 4 | Promoter holding 65.06% — very strong skin in the game. Consistent execution: 36% 5Y sales CAGR. IPO in 2023, using capital for expansion. |\n| Financials | 4 | ROE 22.8%, ROCE 23.7% — solid. OPM 10-11% is typical for PEB/EPC. Debt manageable (D/E 0.64). Working capital cycle 36 days is efficient. |\n| Growth Runway | 4 | India industrial/infra capex boom (PLI factories, data centers, warehousing, logistics parks). PEB penetration in India ~15% vs 70%+ in developed markets. Long runway. |\n| Valuation | 2 | Currently at ₹160, down 54% from 52-week high ₹344. P/E 19.5 and P/B 2.33 — cheap relative to growth. But currently at 52-week low, suggesting market concerns. |\n| **Total** | **17/25** | **Grade B: Moderate Conviction** |\n\n---\n\n## 3. Why This Could Be a Multi-Bagger\n\n- **Catalyst 1: PEB penetration.** India PEB adoption ~15% of total construction vs 70%+ in US/China. As adoption grows, addressable market expands massively.\n- **Catalyst 2: Industrial capex wave.** PLI scheme driving factory construction. Data center buildout. Warehousing/logistics boom (ecommerce). All need PEB solutions.\n- **Catalyst 3: Modular construction shift.** EPACK's modular prefab capabilities position it for the global shift toward off-site construction (faster, greener, cheaper).\n- **Catalyst 4: Capacity expansion.** New manufacturing facilities expanding capacity. Revenue can scale without proportional cost increase (operating leverage).\n\n---\n\n## 4. Key Metrics (Consolidated)\n\n| Metric | FY23 | FY24 | FY25 | TTM |\n|--------|------|------|------|-----|\n| Revenue (Cr) | 657 | 905 | 1,134 | ~1,054* |\n| Net Profit (Cr) | 24 | 43 | 59 | ~62* |\n| OPM % | ~9% | ~10% | 10% | ~10% |\n| ROCE % | — | — | 23.7% | — |\n| ROE % | — | — | 22.8% | — |\n| Debt/Equity | — | — | 0.64 | — |\n| Promoter % | — | — | — | 65.06% |\n| P/E | — | — | — | 19.5 |\n| P/B | — | — | — | 2.33 |\n\n*TTM from trailing quarters.*\n\n### Growth\n- 5Y Sales CAGR: 36%\n- 5Y Profit CAGR: 41%\n- 3Y Sales CAGR: 36%\n\n### Quarterly Trend (Cr)\n\n| Quarter | Revenue | Net Profit | OPM % |\n|---------|---------|------------|-------|\n| Mar 2025 | 331 | 20 | 11% |\n| Jun 2025 | 295 | 16 | 10% |\n| Sep 2025 | 434 | 29 | 12% |\n| Dec 2025 | 325 | 17 | 10% |\n\n---\n\n## 5. Valuation\n\n- **Current Price:** ₹160\n- **Market Cap:** ₹1,611 Cr\n- **52-Week High/Low:** ₹344 / ₹153\n- **Shares Outstanding:** ~10.07 Cr\n\n### Model 1: DCF (Discounted Cash Flow)\n\n*Base FCF: ₹59 Cr (FY25 net profit) | Discount rate: 12% | Terminal growth: 5%*\n\n| Scenario | Growth Rates (5yr) | Fair Value | vs ₹160 |\n|----------|-------------------|------------|---------|\n| Bear | 10%→4% declining | ₹95 | -41% |\n| Base | 20%→10% declining | ₹133 | -17% |\n| Bull | 30%→15% declining | ₹172 | +7% |\n\n**Reverse DCF:** Market is pricing in **20% FCF CAGR** for 5 years. Reasonable given 36% historical sales CAGR.\n\n### Model 2: P/B-ROE (Justified Price-to-Book)\n\n*Book Value: ₹68.7 | Cost of Equity: 12%*\n\n| Scenario | Sustainable ROE | Justified P/B | Fair Value | vs ₹160 |\n|----------|----------------|---------------|------------|---------|\n| Bear | 15% (ROE declines) | 1.50x | ₹103 | -36% |\n| Base | 22% (current) | 6.00x | ₹412 | +158% |\n| Bull | 28% (margin expansion) | 14.33x | ₹985 | +515% |\n\n**Implied ROE:** At P/B 2.33x, market implies only **17% ROE** — below current 22.8%. Market is skeptical.\n\n### Why the Models Disagree\n\n| | DCF | P/B-ROE |\n|---|---|---|\n| Says | Slightly overvalued (base) | Significantly undervalued (base) |\n| Reason | Small absolute profit base | Rewards high ROE at low P/B |\n| Key assumption | 20% CAGR is the max | ROE sustains at 22%+ |\n\n**The stock is near 52-week low.** P/B-ROE model strongly suggests undervaluation IF ROE sustains. DCF is more cautious because absolute profits are still small. The divergence suggests this could be a good entry point if fundamentals hold.\n\n### What Needs to Be True for 5x? (₹800/share = ₹8,000Cr market cap)\n\nAt 25x P/E: needs ₹320Cr profit. At 10% net margin on ₹3,200Cr revenue (~3x current). Given 36% historical CAGR, this needs ~3 years of 35%+ growth. Ambitious but not impossible with PEB tailwinds. **Possible 5-bagger in 3-4 years.**\n\n---\n\n## 6. Risks\n\n| Risk | Probability | Impact | Mitigation |\n|------|-------------|--------|------------|\n| PEB industry cyclicality — tied to capex cycles | Medium | High | Diversified end-markets (industrial, commercial, infra) |\n| Competition from Interarch, Zamil, Kirby etc. | High | Medium | End-to-end + modular capability differentiates |\n| Steel price volatility (key raw material) | High | Medium | Pass-through clauses in contracts, but lags |\n| Execution scaling (new facilities) | Medium | Medium | Track record of 36% CAGR suggests capability |\n| Working capital pressure at scale | Medium | Medium | Current WC cycle 36 days — efficient |\n\n---\n\n## 7. Exit Triggers\n\n- [ ] ROE drops below 15% for 2 consecutive quarters\n- [ ] Revenue growth below 15% YoY for 2 quarters\n- [ ] OPM declines below 8% (margin erosion)\n- [ ] Promoter holding drops below 55%\n- [ ] Debt/Equity exceeds 1.0\n\n---\n\n## 8. Review Schedule\n\n- **Next quarterly check:** Q4 FY26 results (April/May 2026)\n- **Key events to watch:**\n  - Order inflow and backlog data\n  - New facility ramp-up and utilization\n  - Steel price trends (key input cost)\n  - Quarterly OPM trajectory\n\n---\n\n## 9. Decision History\n\n| Date | Action | Price | Quantity | Reasoning |\n|------|--------|-------|----------|-----------|\n| Multiple | BUY | ₹228 avg | 451 | India infra/industrial capex boom, PEB penetration story |\n\n---\n\n## 10. Position Note\n\n**Currently down 30% — significant unrealized loss.** However:\n- P/B-ROE model says this is undervalued at current P/B 2.33x (market implies only 17% ROE vs actual 22.8%)\n- Stock near 52-week low — could be a value opportunity or a value trap\n- Key question: Is the revenue slowdown (Q3 FY26 ₹325Cr vs Q2 ₹434Cr) temporary or structural?\n- **Action:** Hold. If Q4 FY26 shows revenue recovery and OPM holds 10%+, consider averaging down.\n\n---\n\n## 11. Research Log\n\n*New learnings, commentary, and thesis updates — most recent first.*\n*Full edit history: `git log research/EPACK.md`*\n\n### 2026-03-11 — Initial thesis created\n- Built 2-model valuation: DCF (base -17%), P/B-ROE (base +158% if ROE sustains)\n- Key insight: Market is pricing in only 17% ROE — below actual 22.8%. This suggests undervaluation OR market expects ROE decline.\n- Stock at 52-week low. Models disagree: DCF cautious, P/B-ROE bullish. The P/B-ROE case is compelling if fundamentals hold.\n- Quarterly revenue volatile (₹295-434Cr range) — need to monitor trend\n- Quality Score: 17/25 (Grade B). MOAT 3, Management 4, Financials 4, Growth 4, Valuation 2.\n");
