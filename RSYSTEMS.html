AGR: 17% | 5Y Profit CAGR: 20%**\n\n### Quarterly Trend (accelerating)\n| Quarter | Revenue | Net Profit | EPS |\n|---------|---------|-----------|-----|\n| Q3 FY25 | ₹499 Cr | ₹35 Cr | ₹2.98 |\n| Q4 FY25 | ₹555 Cr | ₹36 Cr | ₹3.08 |\n| Q1 FY26 | ₹442 Cr | ₹39 Cr | ₹3.26 |\n| Q2 FY26 | ₹462 Cr | ₹76 Cr | ₹6.41 |\n\nQ2 FY26 profit doubled QoQ — significant. Watch if this sustains.\n\n### Key Ratios\n- D/E: 0.53x\n- ROE: 28.7% | ROCE: 22.8%\n- Dividend Yield: **4.34%**\n- Promoter: 51.88% | FII: 3.55% (from 0.25%) | DII: 9.41% (from 0%)\n\n---\n\n## 4. The Institutional Signal\n\nFIIs went from 0.25% → 3.55% and DIIs from 0% → 9.41% in 2 years. Combined institutional holding now ~13% vs near-zero before. When smart money accumulates a small-cap IT company at 16.7x P/E with 4.34% yield, it's worth holding.\n\n---\n\n## 5. Exit Triggers\n- [ ] Revenue growth turns negative for 2 quarters\n- [ ] Dividend cut (removes core value thesis)\n- [ ] Institutional holding reverses (FII/DII selling)\n- [ ] D/E rises above 1.0\n\n---\n\n## 6. Research Log\n### 2026-03-12 — Initial thesis\n- Discovered via Groww MCP: 350 shares, ₹1L, +0.59%\n- Cheap IT at 16.7x P/E + 4.34% dividend. Institutional accumulation is the signal.\n- Q2 FY26 profit spike (₹76 Cr vs ₹35-39 Cr prior) needs investigation — one-time or structural?\n- Hold. Dividend provides floor.\n")</script>
