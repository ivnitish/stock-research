document.getElementById('content').innerHTML=marked.parse('# Banco Products (India) Ltd (BANCOINDIA.NS) — Investment Thesis\n\n**Status:** OWNED (unknown shares, ₹58,950 invested, 5.8% of portfolio)\n**Quality Score:** 20/25 (Grade A: High Conviction)\n**Last Updated:** 2026-03-11\n**Data Source:** Screener.in (consolidated)\n\n---\n\n## 1. Business Summary\n\nIndia\'s leading manufacturer of automotive cooling and sealing products. Core products: radiators, oil coolers, intercoolers, AC condensers, charge air coolers, and gaskets. Serves major OEMs (Tata Motors, M&M, Maruti, Ashok Leyland, commercial vehicle players) and exports to global markets. Asset-light manufacturing with high ROE. The thesis is India\'s auto sector growth + export opportunity in thermal management components, which are becoming more critical in both ICE and hybrid/EV powertrains.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 4 | Niche auto components (thermal management) with OEM certifications. Switching costs high — OEMs qualify suppliers via lengthy approval process. ACMA-certified, IATF 16949. Export capability is rare in Indian auto components. |\n| Management | 4 | Promoter-led (Bansali family, ~50%+ holding). Pays regular dividend (1.91% yield). Capital-efficient — ROE 32% on minimal debt. 5Y profit CAGR 39% is exceptional for a manufacturing business. |\n| Financials | 5 | ROE 32.2%, ROCE 32.4% — exceptional. Zero or near-zero debt. OPM ~14-15%. FY25 profit ₹392 Cr on healthy revenue. 5Y profit CAGR 39%. Dividend-paying. This is genuinely high-quality. |\n| Growth Runway | 4 | India auto sector growing 8-12% CAGR. Commercial vehicle recovery underway. Exports to EU/US OEMs (global thermal management market growing). Hybrid/EV not an existential threat — EVs also need thermal management for battery cooling. |\n| Valuation | 3 | P/E ~17x and P/B ~5x. DCF base case -2% (roughly fairly valued). P/B-ROE model says undervalued if 30%+ ROE sustains. Implied growth 13% — modest and achievable. Not cheap, but not expensive for this quality. |\n| **Total** | **20/25** | **Grade A: High Conviction** |\n\n---\n\n## 3. Why This Could Be a Multi-Bagger\n\n- **Catalyst 1: India CV cycle recovery.** Commercial vehicles (trucks, buses) use more cooling systems per vehicle. India\'s logistics infrastructure build-out + infrastructure spending = CV volume recovery = higher demand for Banco\'s products.\n- **Catalyst 2: Export expansion.** Banco already exports to global OEMs. European OEMs are diversifying supply chains away from China (post-2022). Indian quality auto component suppliers with IATF certifications are prime beneficiaries.\n- **Catalyst 3: EV/Hybrid thermal management.** Battery thermal management in EVs is a growing TAM. Banco\'s core competency (heat exchange) directly applies. Not an EV threat — it\'s an opportunity.\n- **Catalyst 4: Operating leverage.** With 32% ROE and minimal capex needs, incremental revenue flows through to profit efficiently. Not a capital-intensive business.\n\n---\n\n## 4. Key Metrics (Consolidated)\n\n| Metric | FY21 | FY22 | FY23 | FY24 | FY25 |\n|--------|------|------|------|------|------|\n| Revenue (Cr) | ~800 | ~1,000 | ~1,200 | ~1,450 | ~1,800* |\n| Net Profit (Cr) | ~120 | ~160 | ~230 | ~310 | 392 |\n| OPM % | ~12% | ~14% | ~14% | ~15% | ~15% |\n| ROCE % | — | — | — | — | 32.4% |\n| ROE % | — | — | — | — | 32.2% |\n| Debt/Equity | — | — | — | — | ~0 |\n| Promoter % | — | — | — | — | ~50%+ |\n| P/E | — | — | — | — | ~17 |\n| P/B | — | — | — | — | ~5.05 |\n\n*Revenue estimated from profit trajectory. Screener.in for exact figures.\n\n### Growth\n- 5Y Profit CAGR: **39%** (exceptional for manufacturing)\n- Dividend yield: 1.91% (consistent payer)\n\n---\n\n## 5. Valuation\n\n- **Current Price:** ₹576\n- **Market Cap:** ~₹8,237 Cr (14.3 Cr shares)\n- **Book Value per Share:** ₹114\n\n### Model 1: DCF (Discounted Cash Flow)\n\n*Base FCF: ₹392 Cr (FY25 net profit) | Discount rate: 12% | Terminal growth: 5%*\n\n| Scenario | Growth Rates (5yr) | Fair Value | vs ₹576 |\n|----------|-------------------|------------|---------|\n| Bear | 5%→3% declining | ₹417 | -28% |\n| Base | 13%→6% declining | ₹567 | -2% |\n| Bull | 20%→10% declining | ₹701 | +22% |\n\n**Reverse DCF:** Market implies **13.2% FCF CAGR** — modest and achievable for a company with 39% 5Y profit CAGR.\n\n### Model 2: P/B-ROE (Justified Price-to-Book)\n\n*Book Value: ₹114 | Cost of Equity: 12% | Terminal growth: 5%*\n\n| Scenario | Sustainable ROE | Justified P/B | Fair Value | vs ₹576 |\n|----------|----------------|---------------|------------|---------|\n| Bear | 20% (ROE halves) | 2.14x | ₹244 | -58% |\n| Base | 30% (ROE holds) | 3.57x | ₹407 | -29% |\n| Bull | 40% (ROE improves) | 5.00x | ₹570 | -1% |\n\n**Implied ROE at P/B 5.05x:** ~40% — slightly above current 32%. Achievable if export volumes grow.\n\n### The Valuation Verdict\n\nThe two models give different reads:\n- **DCF says fairly valued**: Implied 13.2% growth is the base case — company has delivered 39% CAGR, so 13% is conservative. DCF doesn\'t look expensive.\n- **P/B-ROE says fair in bull**: Base (30% sustained ROE) gives ₹407, but ROE is currently 32% — so the "base" scenario is already being achieved today.\n\n**Key insight:** P/B-ROE base underestimates because it uses 30% when actual ROE is 32%. At 32% sustained ROE, justified P/B = (0.32-0.05)/(0.12-0.05) = 3.86x → Fair value = ₹114 × 3.86 = ₹440. The current price of ₹576 prices in ROE slightly above current levels — not unreasonable.\n\n**Verdict: Roughly fairly valued. Not cheap, but not expensive. This is a high-quality business at a fair price — Munger\'s ideal.**\n\n---\n\n## 6. Risks\n\n| Risk | Probability | Impact | Mitigation |\n|------|-------------|--------|------------|\n| Auto sector slowdown (volume cycle) | Medium | High | Diversified across PV, CV, 2W. Export buffer. |\n| EV transition — ICE radiator demand | Low-Med | Medium | EVs need thermal mgmt too (battery cooling) |\n| Customer concentration (Tata/M&M dependence) | Medium | Medium | Multiple OEM relationships, exports |\n| Raw material cost pressure (aluminium, copper) | Medium | Low | Pass-through pricing typical in OEM contracts |\n| Promoter succession risk | Low | Medium | Second generation involved in business |\n\n---\n\n## 7. Exit Triggers\n\n- [ ] ROE declines below 20% for 2 consecutive years\n- [ ] Net profit growth falls below 10% for 2 years\n- [ ] Promoter stake drops below 40%\n- [ ] Debt/Equity exceeds 0.5 (currently near zero)\n- [ ] ICE auto volumes decline structurally (not cyclically)\n- [ ] Better capital allocation opportunity at higher quality/lower valuation\n\n---\n\n## 8. Review Schedule\n\n- **Next quarterly check:** Q4 FY26 results (April/May 2026)\n- **Key events to watch:**\n  - Auto OEM volume data (monthly SIAM data)\n  - Quarterly margin trends vs raw material costs\n  - Export order wins\n  - Any capex announcements (expansion?)\n\n---\n\n## 9. Decision History\n\n| Date | Action | Price | Quantity | Reasoning |\n|------|--------|-------|----------|-----------|\n| Multiple | BUY | ~₹589 avg | ~100 | Auto components, OEM relationships, dividend |\n\n*Quantity estimated: ₹58,950 invested ÷ ₹589 avg ≈ 100 shares*\n\n---\n\n## 10. Position Sizing Note\n\n**5.8% at Grade A is reasonable but slightly low for this quality.** This is one of the better fundamental businesses in the portfolio:\n- 32% ROE is rare in manufacturing\n- Near-zero debt means no financial risk\n- Implied growth (13.2%) very conservative vs delivered CAGR (39%)\n- **Could be a candidate to ADD on dips below ₹500 (P/B ~4.4x, DCF bear case)**\n\nCurrent allocation slightly below what a Grade A business deserves. If GROWW is trimmed (currently 34.6%), BANCOINDIA is a good destination for capital.\n\n---\n\n## 11. Research Log\n\n*New learnings, commentary, and thesis updates — most recent first.*\n*Full edit history: `git log research/BANCOINDIA.md`*\n\n### 2026-03-11 — Initial thesis created\n- Built 2-model valuation: DCF (base -2%, roughly fair), P/B-ROE (base ₹407 but actual ROE 32% already above "base" assumption)\n- Key insight: Implied market growth rate (13.2%) is very conservative vs actual 5Y CAGR (39%). This business appears fairly valued to slightly cheap vs earnings power.\n- Upgraded to Grade A (20/25) — exceptional ROE/ROCE for a manufacturing company, minimal debt, OEM moat, dividend payer\n- Major risk is auto sector cyclicality and EV transition, but thermal management remains relevant for EVs\n- 5.8% allocation is reasonable. Could increase to 8-10% on dips if trimming GROWW.\n- Quality Score: 20/25. MOAT 4, Management 4, Financials 5, Growth 4, Valuation 3.\n');
