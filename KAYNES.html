document.getElementById('content').innerHTML=marked.parse('# Kaynes Technology India (KAYNES.NS) — Investment Thesis\n\n**Status:** OWNED (31 shares, ₹1.22L invested, 12% of portfolio)\n**Quality Score:** 17/25 (Grade B: Moderate Conviction)\n**Last Updated:** 2026-03-12\n**Data Source:** Screener.in (consolidated) + yfinance\n\n---\n\n## 1. Business Summary\n\nIndia\'s leading end-to-end IoT solutions and electronics manufacturing services (EMS) company. Serves automotive, industrial, aerospace & defence, railways, and medical electronics. Founded 1988 in Mysore, listed 2022. The thesis is India\'s electronics manufacturing push (PLI scheme) + import substitution creating a massive TAM for domestic EMS players.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 3 | EMS is competitive globally, but Kaynes has niche in high-reliability segments (defence, aerospace, medical). PCBA + box-build + design = higher value chain. Not a pure contract manufacturer. |\n| Management | 4 | Promoter-led (Ramesh Kunhikannan), 53.46% promoter holding — strong skin in the game. Aggressive capacity expansion. Track record of 49% 5Y sales CAGR. |\n| Financials | 3 | ROE 11%, ROCE 14.3% — decent but not exceptional. OPM 15% typical for EMS. Debt ₹903Cr is meaningful (D/E ~0.5). Growing fast but margins under pressure from expansion capex. |\n| Growth Runway | 5 | India EMS market growing 30%+ CAGR. Defence localization mandate. PLI scheme benefits. Revenue 5Y CAGR 49%. Order book visibility strong. Expanding into OSAT (semiconductor packaging). |\n| Valuation | 2 | P/E 64.6 is very expensive. P/B 5.7x for 11% ROE — hard to justify. Market pricing in massive growth. DCF says overvalued even in bull case. |\n| **Total** | **17/25** | **Grade B: Moderate Conviction** |\n\n---\n\n## 3. Why This Could Be a Multi-Bagger\n\n- **Catalyst 1: India electronics manufacturing boom.** Govt targeting $500B electronics production by 2030 (from ~$100B). Kaynes positioned as quality domestic supplier.\n- **Catalyst 2: Defence/aerospace localization.** Govt mandating indigenous content in defence procurement. Kaynes has DRDO/HAL relationships and defence certifications.\n- **Catalyst 3: OSAT entry.** Kaynes entering semiconductor packaging (OSAT) — if successful, this is a massive margin and TAM expansion from EMS into semicon.\n- **Catalyst 4: Operating leverage.** New facilities coming online (Chamarajanagar, Telangana). As utilization ramps, OPM could expand from 15% to 18-20%.\n\n---\n\n## 4. Key Metrics (Consolidated)\n\n| Metric | FY23 | FY24 | FY25 | TTM |\n|--------|------|------|------|-----|\n| Revenue (Cr) | 1,156 | 1,822 | 2,722 | ~3,000* |\n| Net Profit (Cr) | 85 | 185 | 293 | ~320* |\n| OPM % | 14% | 14% | 15% | ~15% |\n| ROCE % | — | — | 14.3% | — |\n| ROE % | — | — | 11% | — |\n| Debt/Equity | — | — | ~0.5 | — |\n| Promoter % | — | — | 53.46% | 53.46% |\n| P/E | — | — | — | 64.6 |\n| P/B | — | — | — | 5.7 |\n\n*TTM estimated from trailing quarters.\n\n### 5Y Growth\n- Sales CAGR: 49%\n- Profit CAGR: 95%\n\n---\n\n## 5. Valuation\n\n- **Current Price:** ₹3,726 (updated Mar 2026 — near 52-week low)\n- **52-week range:** ₹3,295 – ₹7,705 (down **52% from peak**)\n- **Market Cap:** ₹24,967 Cr\n- **P/E (TTM):** 63x | **P/E (Forward):** 42x\n- **P/B:** 5.2x | **Book Value:** ₹715/share\n- **Shares Outstanding:** ~6.7 Cr\n\n### Critical Signal: Revenue vs Earnings Growth Divergence\n\n| Metric | Value | Implication |\n|--------|-------|-------------|\n| Revenue growth (YoY) | 21.6% | Top-line healthy |\n| **Earnings growth (YoY)** | **8.9%** | **Red flag: margin compression** |\n| Gross margin | 34.6% | Good for EMS (value-add evident) |\n| Operating margin | 12.3% | **Was 14-15% in FY23-25 — declining** |\n| D/E (yfinance) | 18.9x | High; includes customer advances + working capital |\n\n**The key question:** Revenue growing 22% but profits only 9%. This gap = margin compression. Causes: (1) new facility fixed costs before revenue ramps, (2) OSAT capex drag, (3) input cost pressure, (4) competition on pricing. If this is temporary (capex cycle), it resolves. If structural (competition), the bull thesis weakens significantly.\n\n### Forward P/E Decomposed\n\nForward P/E of 42x implies FY27 PAT ~₹600 Cr (vs TTM ~₹390 Cr). That\'s 54% earnings growth in 2 years while current growth is 9%. This requires margin expansion from 12% → 18%. **That\'s a very optimistic assumption baked into the "cheap" forward P/E.**\n\n### Model 1: DCF (Discounted Cash Flow)\n\n*Base FCF: ₹293 Cr (FY25 net profit) | Discount rate: 12% | Terminal growth: 5%*\n\n| Scenario | Growth Rates (5yr) | Fair Value | vs ₹3,990 |\n|----------|-------------------|------------|-----------|\n| Bear | 15%→6% declining | ₹868 | -78% |\n| Base | 30%→12% declining | ₹1,299 | -67% |\n| Bull | 40%→20% declining | ₹1,848 | -54% |\n\n**Reverse DCF:** Market is pricing in **53% FCF CAGR** for 5 years. Extremely aggressive.\n\n### Model 2: P/B-ROE (Justified Price-to-Book)\n\n*Book Value: ₹698 | Cost of Equity: 12%*\n\n| Scenario | Sustainable ROE | Justified P/B | Fair Value | vs ₹3,990 |\n|----------|----------------|---------------|------------|-----------|\n| Bear | 10% (current) | 0.67x | ₹465 | -88% |\n| Base | 15% (improves) | 2.50x | ₹1,745 | -56% |\n| Bull | 20% (OSAT + scale) | 7.67x | ₹5,351 | +34% |\n\n**Implied ROE:** At P/B 5.7x, market implies **31% ROE** — nearly 3x current ROE of 11%.\n\n### Why the Models Agree (Both Say Expensive)\n\nBoth DCF and P/B-ROE say KAYNES is overvalued unless ROE significantly improves. The bull case requires:\n- ROE improving from 11% → 20%+ (needs margin expansion + asset turnover improvement)\n- Revenue CAGR sustaining 30%+ for 5 years\n- OSAT business contributing meaningfully\n\n### What Needs to Be True for 5x? (₹19,950/share)\n\nWould need ₹1,26,000 Cr market cap. At 40x P/E, needs ₹3,150 Cr profit (11x current). Revenue needs to hit ₹20,000+ Cr with 15%+ net margin. Possible in 5-7 years if EMS tailwinds play out, but priced in at current levels.\n\n---\n\n## 6. Risks\n\n| Risk | Probability | Impact | Mitigation |\n|------|-------------|--------|------------|\n| OSAT execution risk — capex heavy, unproven territory | High | High | Management has EMS track record, but semicon is different |\n| Margin pressure from competition + raw material costs | Medium | Medium | Moving up value chain to design-led manufacturing |\n| Debt increasing with expansion (D/E ~0.5) | Medium | Medium | Order book provides revenue visibility |\n| Customer concentration risk | Medium | Medium | Diversifying across automotive, defence, industrial |\n| P/E compression if growth slows | High | High | At 64x P/E, even small miss causes sharp correction |\n\n---\n\n## 7. Exit Triggers\n\n- [ ] Revenue growth drops below 20% YoY for 2 consecutive quarters\n- [ ] OPM declines below 12% (margin erosion)\n- [ ] Promoter holding drops below 45%\n- [ ] OSAT project faces major delays or cost overruns\n- [ ] Debt/Equity exceeds 1.0\n\n---\n\n## 8. Review Schedule\n\n- **Next quarterly check:** Q4 FY26 results (April/May 2026)\n- **Key events to watch:**\n  - OSAT facility progress and timeline\n  - New order wins (defence, automotive)\n  - Quarterly margin trends\n  - Capacity utilization at new plants\n\n---\n\n## 9. Decision History\n\n| Date | Action | Price | Quantity | Reasoning |\n|------|--------|-------|----------|-----------|\n| Multiple | BUY | ₹3,923 avg | 31 | India EMS growth story, defence localization, OSAT optionality |\n\n---\n\n## 10. Position Sizing Note\n\n**12% of portfolio — reasonable for Grade B conviction.** However, valuation is stretched at 64x P/E. Both DCF and P/B-ROE models suggest the stock is priced for near-perfect execution. Consider:\n- Hold if conviction in OSAT + margin expansion is high\n- Don\'t add at current levels — wait for correction or earnings to catch up\n- This is a "hold and monitor" position, not an "add aggressively" one\n\n---\n\n## 11. Research Log\n\n*New learnings, commentary, and thesis updates — most recent first.*\n*Full edit history: `git log research/KAYNES.md`*\n\n### 2026-03-12 — v2: Screener.in data + FCF analysis + promoter holding update\n\n**Key Screener.in findings (significantly update v1 thesis):**\n\n**Annual P&L (FY21→FY25):**\n\n| Year | Revenue (Cr) | Op Profit (Cr) | OPM% | Net Profit (Cr) | EPS |\n|------|-------------|---------------|------|----------------|-----|\n| FY21 | 420 | 42 | 10% | 10 | ₹13.79 |\n| FY22 | 706 | 95 | 13% | 42 | ₹9.03 |\n| FY23 | 1,126 | 170 | 15% | 95 | ₹16.37 |\n| FY24 | 1,805 | 257 | 14% | 183 | ₹28.68 |\n| FY25 | 2,722 | 416 | 15% | 293 | ₹45.84 |\n\nRevenue CAGR FY21-FY25: **59%** | Profit CAGR: **130%**\n\n**Recent Quarterly Trend:**\n\n| Quarter | Revenue (Cr) | Net Profit (Cr) | OPM% |\n|---------|-------------|----------------|------|\n| Sep 2024 | 572 | 60 | 14% |\n| Dec 2024 | 661 | 66 | 14% |\n| Mar 2025 | 984 | 116 | **17%** |\n| Jun 2025 | 673 | 75 | **17%** |\n| Sep 2025 | 906 | 121 | 16% |\n| Dec 2025 | 804 | 77 | 15% |\n\nOPM recovering to 15-17% — margins improving, not collapsing.\n\n**Cash Flow (critical concern):**\n\n| Year | CFO (Cr) | Capex (Cr) | FCF (Cr) |\n|------|----------|-----------|---------|\n| FY23 | -42 | 494 | -536 |\n| FY24 | 70 | 1,505 | **-1,435** |\n| FY25 | -82 | 355 | -437 |\n\nFCF is deeply negative — KAYNES is in heavy investment phase. Capex peaked in FY24 (₹1,505 Cr) and dropped sharply to ₹355 Cr in FY25. As capex normalizes, FCF should turn positive from FY26-27.\n\n**Shareholding (red flag — monitor closely):**\n\n| Category | Mar 2025 | Dec 2025 | Change |\n|----------|----------|----------|--------|\n| Promoters | 57.75% | 53.46% | **-4.29%** |\n| FIIs | 11.17% | 8.87% | -2.30% |\n| DIIs | 16.98% | 16.73% | -0.25% |\n\nPromoter holding dropped 4.3% in 9 months. FIIs also exiting. This is a material concern — why are promoters selling?\n\n**D/E correction:** Screener shows D/E = 0.33 (not 18.9 as yfinance showed — yfinance was wrong, likely including client advances).\n\n**Revised thesis:**\n- Business fundamentals are healthy (OPM 15-17%, not compressing)\n- The stock fell 52% because capex peaked and FCF was deeply negative — market didn\'t like cash burn\n- Capex is now normalizing. FY26 FCF should improve significantly\n- BUT promoter selling of 4.3% is a serious concern — requires explanation\n- D/E 0.33 is actually fine — the leverage concern was a data error\n\n**Verdict update:** Thesis partially intact. Hold. The capex-driven FCF trough may be the entry opportunity. The promoter selling is the key risk to resolve via Groww concall transcript or NSE filings.\n- At current pace, KAYNES is a "watch and wait" — monitor Q4 FY26 results and promoter filing\n\n### 2026-03-11 — Initial thesis created\n- Built 2-model valuation: DCF (very bearish at current price), P/B-ROE (bearish unless ROE improves to 20%+)\n- Key insight: Market implies 53% FCF CAGR or 31% ROE — both aggressive vs actuals (49% sales CAGR, 11% ROE)\n- The ROE gap (11% actual vs 31% implied) is concerning. KAYNES needs margin expansion + asset efficiency gains.\n- OSAT entry is the key catalyst — if it works, transforms the business. If it doesn\'t, current valuation is hard to justify.\n- Quality Score: 17/25 (Grade B). MOAT 3, Management 4, Financials 3, Growth 5, Valuation 2.\n');
