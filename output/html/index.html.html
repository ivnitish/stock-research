.72rem; padding: 24px; }\n</style>\n</head>\n<body>\n\n<header>\n  <div class="header-top">\n    <div>\n      <h1>Stock Research</h1>\n      <p>Munger-style · India + US · Live as of 13 Mar 2026 18:35 IST</p>\n    </div>\n    <div class="view-toggle">\n      <button class="view-btn active" id="btn-table" onclick="setView(\'table\')">≡ Table</button>\n      <button class="view-btn" id="btn-cards" onclick="setView(\'cards\')">⊞ Cards</button>\n    </div>\n  </div>\n  <div class="pf-strip">\n    <div class="pf-item">Invested: <span>₹15.21L</span></div>\n    <div class="pf-item">Current: <span>₹13.84L</span></div>\n    <div class="pf-item">P&amp;L: <span class="pf-red">-₹1.37L India / -$332 US</span></div>\n    <div class="pf-item">US: <span>$946.71 current · -25.96%</span></div>\n    <div class="pf-item">Combined invested: <span>~₹16.28L</span></div>\n  </div>\n  <div class="filters">\n    <button class="filter-btn active" onclick="filter(\'all\', this)">All</button>\n    <button class="filter-btn" onclick="filter(\'india\', this)">India</button>\n    <button class="filter-btn" onclick="filter(\'us\', this)">US</button>\n    <button class="filter-btn" onclick="filter(\'grade-a\', this)">Grade A</button>\n    <button class="filter-btn" onclick="filter(\'grade-b\', this)">Grade B</button>\n    <button class="filter-btn" onclick="filter(\'grade-c\', this)">Grade C</button>\n    <button class="filter-btn accent" onclick="filter(\'add\', this)">Add Candidates</button>\n    <button class="filter-btn accent" onclick="filter(\'avg\', this)">Avg Down</button>\n    <button class="filter-btn" onclick="filter(\'exit\', this)">Exit List</button>\n    <button class="filter-btn" onclick="filter(\'watch\', this)">Watchlist</button>\n    <button class="filter-btn" onclick="filter(\'tracking\', this)">Tracking (1 share)</button>\n  </div>\n</header>\n\n<div class="container">\n\n  <!-- ═══════════ TABLE VIEW ═══════════ -->\n  <div class="table-wrap">\n    <table>\n      <thead>\n ₹64.8K realized losses</div>\n      </a>\n    </div>\n\n  </div>\n\n</div>\n\n<!-- ═══════════════════════════════════════════════════════════════════════\n     SUSTAINED ROE DEEP DIVE: ICICIAMC vs GROWW\n     Framework: P/B-ROE (Anu Maheshwari / Munger) — ROE determines justified P/B\n     ════════════════════════════════════════════════════════════════════════ -->\n<section id="roe-comparison" style="max-width:900px;margin:48px auto 0;padding:0 16px">\n\n  <div style="border-top:2px solid #1a1a2e;padding-top:28px;margin-bottom:20px">\n    <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#888;margin-bottom:6px">Deep Dive · Quality vs Quality</div>\n    <h2 style="font-family:-apple-system,sans-serif;font-size:1.4rem;font-weight:700;color:#1a1a2e;margin:0 0 6px">\n      Sustained ROE: ICICIAMC vs GROWW\n    </h2>\n    <p style="font-family:-apple-system,sans-serif;font-size:0.88rem;color:#555;margin:0;line-height:1.6">\n      Both are India fintech compounders. Both owned. But which ROE actually sustains — and what does that mean for 5-year fair value?\n      Framework: <em>ROE determines justified Price-to-Book</em> (P/B = ROE / Cost of Equity for a perpetuity).\n    </p>\n  </div>\n\n  <!-- Framework box -->\n  <div style="background:#f8f9ff;border:1px solid #dde;border-radius:10px;padding:16px 20px;margin-bottom:24px;font-family:-apple-system,sans-serif;font-size:0.84rem;color:#333;line-height:1.7">\n    <strong style="color:#1a1a2e">The P/B-ROE Framework (Anu Maheshwari, 361 AMC CIO):</strong><br>\n    A business earning 15% ROE on book deserves ~1.25× P/B at 12% cost of equity.\n    One earning 30% ROE deserves ~2.5× P/B. At 50% ROE, justified P/B is ~4×.\n    <strong>But "deserves" only holds if the ROE is <em>sustained</em> — not a peak-cycle number.</strong><br>\n    Cyclical businesses (broking, metals) show high ROE in good years; it collapses in downturns.\n    Structural compounders (AMC, FMCG moats) sustain ROE across cycles because revenue is contractual or recurring.\n    <strong>The rule: never pay a compounder multiple for a cyclical ROE.</strong>\n  </div>\n\n  <!-- Side-by-side snapshot -->\n  <h3 style="font-family:-apple-system,sans-serif;font-size:0.95rem;font-weight:700;color:#1a1a2e;margin:0 0 10px">1. Snapshot Comparison</h3>\n  <div style="overflow-x:auto;margin-bottom:24px">\n  <table style="width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:0.82rem;min-width:620px">\n    <thead>\n      <tr style="background:#1a1a2e;color:#fff">\n        <th style="padding:9px 12px;text-align:left">Metric</th>\n        <th style="padding:9px 12px;text-align:right;color:#7ec8e3">ICICIAMC</th>\n        <th style="padding:9px 12px;text-align:right;color:#a8d8a8">GROWW</th>\n        <th style="padding:9px 12px;text-align:left">Edge</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555">CMP / P/E</td>\n        <td style="padding:8px 12px;text-align:right">₹2,880 · 49x</td>\n        <td style="padding:8px 12px;text-align:right">₹156 · 56x</td>\n        <td style="padding:8px 12px;color:#2563eb">ICICIAMC cheaper</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555">P/B (price-to-book)</td>\n        <td style="padding:8px 12px;text-align:right">~18–20×</td>\n        <td style="padding:8px 12px;text-align:right">12.6×</td>\n        <td style="padding:8px 12px;color:#16a34a">GROWW cheaper on P/B</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555">Operating Margin (OPM)</td>\n        <td style="padding:8px 12px;text-align:right;color:#16a34a"><strong>73%</strong></td>\n        <td style="padding:8px 12px;text-align:right">58–62%</td>\n        <td style="padding:8px 12px;color:#2563eb">ICICIAMC</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555">Reported ROE (FY25)</td>\n        <td style="padding:8px 12px;text-align:right">~30%+ implied</td>\n        <td style="padding:8px 12px;text-align:right;color:#16a34a"><strong>50%</strong></td>\n        <td style="padding:8px 12px;color:#16a34a">GROWW — but read below</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555">Debt/Equity</td>\n        <td style="padding:8px 12px;text-align:right;color:#16a34a">0</td>\n        <td style="padding:8px 12px;text-align:right">0.05×</td>\n        <td style="padding:8px 12px;color:#2563eb">ICICIAMC (trivially)</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555">Revenue model</td>\n        <td style="padding:8px 12px;text-align:right">AUM × fee (recurring)</td>\n        <td style="padding:8px 12px;text-align:right">70% broking (transact.)</td>\n        <td style="padding:8px 12px;color:#2563eb">ICICIAMC — structural</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555">Revenue CAGR (3Y)</td>\n        <td style="padding:8px 12px;text-align:right">25%</td>\n        <td style="padding:8px 12px;text-align:right;color:#16a34a"><strong>112% → 45% TTM</strong></td>\n        <td style="padding:8px 12px;color:#16a34a">GROWW — hypergrowth</td>\n      </tr>\n      <tr style="background:#fafafa">\n        <td style="padding:8px 12px;color:#555">Capital required to grow</td>\n        <td style="padding:8px 12px;text-align:right;color:#16a34a"><strong>Zero</strong></td>\n        <td style="padding:8px 12px;text-align:right">Minimal (platform)</td>\n        <td style="padding:8px 12px;color:#2563eb">ICICIAMC</td>\n      </tr>\n    </tbody>\n  </table>\n  </div>\n\n  <!-- ROE dissection -->\n  <h3 style="font-family:-apple-system,sans-serif;font-size:0.95rem;font-weight:700;color:#1a1a2e;margin:0 0 10px">2. Why GROWW\'s 50% ROE is Partially Misleading</h3>\n  <div style="overflow-x:auto;margin-bottom:24px">\n  <table style="width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:0.82rem;min-width:620px">\n    <thead>\n      <tr style="background:#333;color:#fff">\n        <th style="padding:9px 12px;text-align:left">ROE Driver</th>\n        <th style="padding:9px 12px;text-align:left;color:#a8d8a8">GROWW</th>\n        <th style="padding:9px 12px;text-align:left;color:#7ec8e3">ICICIAMC</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Net Margin</td>\n        <td style="padding:8px 12px">~44% (FY25). High — but broking margins compress in bear markets. FY24: net loss due to ESOP costs.</td>\n        <td style="padding:8px 12px">~53%. Structurally stable. Fee income doesn\'t compress with activity — it scales with AUM.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Asset Turnover</td>\n        <td style="padding:8px 12px">High. Platform model uses minimal balance sheet. But MTF lending book is growing → assets will rise → turnover falls.</td>\n        <td style="padding:8px 12px">Very high. AMC manages ₹9.5L Cr AUM off a tiny balance sheet. AUM isn\'t on balance sheet — only mgmt fee receivable.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Equity Leverage</td>\n        <td style="padding:8px 12px">Minimal debt today. But book value is small (IPO was 2025) — retained earnings will grow book, mechanically compressing ROE unless profit grows equally fast.</td>\n        <td style="padding:8px 12px">Zero debt. High dividend payout (~65-70% of profits paid out) deliberately keeps book value lean → sustains ROE optically but also genuinely — returns capital it can\'t use.</td>\n      </tr>\n      <tr style="background:#fafafa">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Cyclicality</td>\n        <td style="padding:8px 12px;color:#dc2626"><strong>High.</strong> SEBI F&O volume restrictions already cut Q3 broking revenue. In a sustained bear market (like 2022), F&O volumes halve. GROWW\'s ROE in that scenario: 15-25%.</td>\n        <td style="padding:8px 12px;color:#16a34a"><strong>Low.</strong> SIP flows (₹25,000 Cr/month) continue in bear markets. AUM falls but fee income has a floor. FY20 COVID: AMCs saw AUM dip 20% then recover fast. ROE floor: ~20-25%.</td>\n      </tr>\n    </tbody>\n  </table>\n  </div>\n\n  <!-- Sustained ROE estimate -->\n  <h3 style="font-family:-apple-system,sans-serif;font-size:0.95rem;font-weight:700;color:#1a1a2e;margin:0 0 10px">3. Sustainable ROE — 3-Scenario Estimate</h3>\n  <div style="overflow-x:auto;margin-bottom:24px">\n  <table style="width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:0.82rem;min-width:620px">\n    <thead>\n      <tr style="background:#1a1a2e;color:#fff">\n        <th style="padding:9px 12px;text-align:left">Scenario</th>\n        <th style="padding:9px 12px;text-align:center;color:#7ec8e3">ICICIAMC ROE</th>\n        <th style="padding:9px 12px;text-align:center;color:#a8d8a8">GROWW ROE</th>\n        <th style="padding:9px 12px;text-align:left">Condition</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;font-weight:600;color:#dc2626">Bear</td>\n        <td style="padding:8px 12px;text-align:center;color:#dc2626">20–22%</td>\n        <td style="padding:8px 12px;text-align:center;color:#dc2626">15–20%</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">Sustained market downturn, SEBI caps F&O, SIP slows</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;font-weight:600;color:#2563eb">Base</td>\n        <td style="padding:8px 12px;text-align:center;color:#2563eb">28–32%</td>\n        <td style="padding:8px 12px;text-align:center;color:#2563eb">30–38%</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">Normal market, SIP grows 15%/yr, broking stable</td>\n      </tr>\n      <tr style="background:#f0fdf4">\n        <td style="padding:8px 12px;font-weight:600;color:#16a34a">Bull</td>\n        <td style="padding:8px 12px;text-align:center;color:#16a34a">35–40%</td>\n        <td style="padding:8px 12px;text-align:center;color:#16a34a">40–50%</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">India equity boom, MF AUM doubles, MTF + loans scale</td>\n      </tr>\n    </tbody>\n  </table>\n  </div>\n  <p style="font-family:-apple-system,sans-serif;font-size:0.82rem;color:#555;margin:0 0 24px;line-height:1.6">\n    <strong>Key difference:</strong> In the bear case, ICICIAMC\'s ROE floor (20-22%) is <em>higher</em> than GROWW\'s (15-20%).\n    ICICIAMC has a tighter band — less upside but also less downside. GROWW has more variance.\n    For a 5-year compounder thesis, low-variance ROE compresses the risk of permanent capital loss.\n  </p>\n\n  <!-- Justified P/B -->\n  <h3 style="font-family:-apple-system,sans-serif;font-size:0.95rem;font-weight:700;color:#1a1a2e;margin:0 0 10px">4. What ROE Implies for Justified Price-to-Book</h3>\n  <p style="font-family:-apple-system,sans-serif;font-size:0.82rem;color:#555;margin:0 0 12px;line-height:1.6">\n    Formula: <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px">Justified P/B = (ROE − g) / (Ke − g)</code> where Ke = 12% cost of equity, g = 5% long-term growth.\n    Simplified for comparison: <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px">Justified P/B ≈ ROE / Ke</code>\n  </p>\n  <div style="overflow-x:auto;margin-bottom:24px">\n  <table style="width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:0.82rem;min-width:620px">\n    <thead>\n      <tr style="background:#333;color:#fff">\n        <th style="padding:9px 12px;text-align:left">Scenario</th>\n        <th style="padding:9px 12px;text-align:center;color:#7ec8e3">ICICIAMC<br>ROE → P/B</th>\n        <th style="padding:9px 12px;text-align:center;color:#a8d8a8">GROWW<br>ROE → P/B</th>\n        <th style="padding:9px 12px;text-align:left">Current P/B</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#dc2626;font-weight:600">Bear (sustained)</td>\n        <td style="padding:8px 12px;text-align:center">21% → <strong>1.8×</strong></td>\n        <td style="padding:8px 12px;text-align:center">18% → <strong>1.5×</strong></td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#dc2626">Both overvalued — but ICICIAMC less so</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#2563eb;font-weight:600">Base</td>\n        <td style="padding:8px 12px;text-align:center">30% → <strong>2.5×</strong></td>\n        <td style="padding:8px 12px;text-align:center">35% → <strong>2.9×</strong></td>\n        <td style="padding:8px 12px;font-size:0.78rem">ICICIAMC ~18-20× P/B (significant premium to justified)</td>\n      </tr>\n      <tr style="background:#fafafa">\n        <td style="padding:8px 12px;color:#16a34a;font-weight:600">Bull</td>\n        <td style="padding:8px 12px;text-align:center">38% → <strong>3.2×</strong></td>\n        <td style="padding:8px 12px;text-align:center">45% → <strong>3.8×</strong></td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#16a34a">Still far below current P/B on pure formula</td>\n      </tr>\n    </tbody>\n  </table>\n  </div>\n  <div style="background:#fff8e1;border:1px solid #ffc;border-radius:8px;padding:14px 18px;margin-bottom:24px;font-family:-apple-system,sans-serif;font-size:0.82rem;color:#444;line-height:1.7">\n    <strong>Honest interpretation:</strong> Both stocks are expensive on a pure justified-P/B basis.\n    The market is paying a <em>franchise premium</em> — pricing in structural growth of India\'s financial ecosystem over 10-15 years.\n    This is not irrational (AMC and broking TAMs are genuinely large) but it means:\n    (1) You are buying on faith in the long-term thesis, not on current fundamentals, and\n    (2) any thesis invalidation (SEBI regulatory shock, passive fund disruption, market crash) causes disproportionate P/B compression.\n    <strong>Both are high-quality businesses priced for perfection.</strong>\n  </div>\n\n  <!-- Scoring -->\n  <h3 style="font-family:-apple-system,sans-serif;font-size:0.95rem;font-weight:700;color:#1a1a2e;margin:0 0 10px">5. ROE Sustainability Score (1–5 per dimension)</h3>\n  <div style="overflow-x:auto;margin-bottom:24px">\n  <table style="width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:0.82rem;min-width:620px">\n    <thead>\n      <tr style="background:#1a1a2e;color:#fff">\n        <th style="padding:9px 12px;text-align:left">Dimension</th>\n        <th style="padding:9px 12px;text-align:center;color:#7ec8e3">ICICIAMC</th>\n        <th style="padding:9px 12px;text-align:center;color:#a8d8a8">GROWW</th>\n        <th style="padding:9px 12px;text-align:left">Why</th>\n      </tr>\n    </thead>\n    <tbody>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Revenue cyclicality</td>\n        <td style="padding:8px 12px;text-align:center">5 / 5</td>\n        <td style="padding:8px 12px;text-align:center">2 / 5</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">AMC fee = f(AUM). SIPs don\'t stop. Broking volumes halve in bear markets.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Capital re-investment drag</td>\n        <td style="padding:8px 12px;text-align:center">5 / 5</td>\n        <td style="padding:8px 12px;text-align:center">3 / 5</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">AMC pays out 65-70% as dividends — keeps book lean, sustains ROE. GROWW re-invests for lending → book grows → ROE dilutes.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Competitive moat protecting margin</td>\n        <td style="padding:8px 12px;text-align:center">4 / 5</td>\n        <td style="padding:8px 12px;text-align:center">3 / 5</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">AMC brand + distribution network + ICICI Bank backing = deep moat. GROWW moat is brand + UX but switching costs are low.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee;background:#fafafa">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Regulatory risk to ROE</td>\n        <td style="padding:8px 12px;text-align:center">3 / 5</td>\n        <td style="padding:8px 12px;text-align:center">2 / 5</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">SEBI TER cuts (ICICIAMC risk). SEBI F&O/MTF restrictions (GROWW risk — SEBI already acted in Oct 2024). GROWW more exposed.</td>\n      </tr>\n      <tr style="border-bottom:1px solid #eee">\n        <td style="padding:8px 12px;color:#555;font-weight:600">Track record of ROE consistency</td>\n        <td style="padding:8px 12px;text-align:center">4 / 5</td>\n        <td style="padding:8px 12px;text-align:center">2 / 5</td>\n        <td style="padding:8px 12px;font-size:0.78rem;color:#666">ICICIAMC: 5+ years of consistent 25-30%+ ROE. GROWW: Net loss in FY24 (ESOP costs), only 1 year of high-ROE post-IPO.</td>\n      </tr>\n      <tr style="background:#f8faff;font-weight:700">\n        <td style="padding:10px 12px;color:#1a1a2e">Total (25 max)</td>\n        <td style="padding:10px 12px;text-align:center;color:#2563eb;font-size:1rem">21 / 25</td>\n        <td style="padding:10px 12px;text-align:center;color:#16a34a;font-size:1rem">12 / 25</td>\n        <td style="padding:10px 12px;color:#1a1a2e">ICICIAMC wins decisively on ROE sustainability</td>\n      </tr>\n    </tbody>\n  </table>\n  </div>\n\n  <!-- Verdict -->\n  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">\n    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:16px 18px;font-family:-apple-system,sans-serif">\n      <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:#2563eb;margin-bottom:6px">ICICIAMC · A·20</div>\n      <div style="font-size:0.9rem;font-weight:700;color:#1e40af;margin-bottom:8px">Structural compounder</div>\n      <ul style="margin:0;padding-left:18px;font-size:0.8rem;color:#333;line-height:1.8">\n        <li>ROE more sustainable (21/25 score)</li>\n        <li>Fee income decoupled from market activity</li>\n        <li>Dividends keep book lean → ROE holds</li>\n        <li>SEBI TER is the only real structural risk</li>\n        <li>Position: only ₹13K. Biggest gap to fill.</li>\n      </ul>\n      <div style="margin-top:10px;font-size:0.78rem;color:#2563eb;font-weight:600">Action: Add meaningfully below ₹2,400</div>\n    </div>\n    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px 18px;font-family:-apple-system,sans-serif">\n      <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:#16a34a;margin-bottom:6px">GROWW · B·19</div>\n      <div style="font-size:0.9rem;font-weight:700;color:#15803d;margin-bottom:8px">High-growth platform — with asterisks</div>\n      <ul style="margin:0;padding-left:18px;font-size:0.8rem;color:#333;line-height:1.8">\n        <li>ROE high but partly cyclical (12/25 score)</li>\n        <li>70% broking revenue = SEBI/market risk</li>\n        <li>MTF + MF + loans = path to sustained ROE</li>\n        <li>ROE will naturally dilute as book grows</li>\n        <li>35% of portfolio — concentrated for a B grade</li>\n      </ul>\n      <div style="margin-top:10px;font-size:0.78rem;color:#16a34a;font-weight:600">Action: Hold. No add until &lt;₹130. Consider trim above ₹190.</div>\n    </div>\n  </div>\n\n  <!-- Bottom line -->\n  <div style="background:#1a1a2e;color:#e2e8f0;border-radius:10px;padding:18px 22px;margin-bottom:8px;font-family:-apple-system,sans-serif;font-size:0.84rem;line-height:1.8">\n    <strong style="color:#fff;font-size:0.9rem">Bottom line:</strong>\n    ICICIAMC has superior ROE sustainability (21/25 vs 12/25). You own ₹13K of the better business and ₹3.53L of the more cyclical one.\n    If the Munger principle is "own the best business in the best industry at a fair price" — the allocation is inverted.\n    GROWW is a fine compounder; ICICIAMC is the structurally superior one.\n    <strong style="color:#7ec8e3">The Nifty 20k scenario is an opportunity to correct this imbalance.</strong>\n  </div>\n  <div style="font-family:-apple-system,sans-serif;font-size:0.72rem;color:#999;text-align:right;margin-bottom:8px">\n    Last updated: 2026-03-13 · Data: Screener.in + Groww MCP · Framework: P/B-ROE (Anu Maheshwari, 361 AMC)\n  </div>\n\n</section>\n\n<footer>Personal research notes · Not investment advice · Live data: Groww MCP 13 Mar 2026 18:35 IST</footer>\n\n<script>\n  function go(url) { window.location.href = url; }\n\n  function setView(v) {\n    document.getElementById(\'btn-table\').classList.toggle(\'active\', v === \'table\');\n    document.getElementById(\'btn-cards\').classList.toggle(\'active\', v === \'cards\');\n    document.body.classList.toggle(\'show-cards\', v === \'cards\');\n    localStorage.setItem(\'view\', v);\n  }\n\n  function filter(key, btn) {\n    document.querySelectorAll(\'.filter-btn\').forEach(b => b.classList.remove(\'active\'));\n    btn.classList.add(\'active\');\n\n    const rows = document.querySelectorAll(\'tr.stock-row, tr.section-row\');\n\n    if (key === \'all\') {\n      rows.forEach(r => r.style.display = \'\');\n      document.querySelectorAll(\'.cards-container .section-title, .cards-container .grid\').forEach(el => el.style.display = \'\');\n      return;\n    }\n\n    rows.forEach(r => {\n      if (r.classList.contains(\'section-row\')) { r.style.display = \'\'; return; }\n      const sec = r.dataset.section || \'\';\n      const grade = r.dataset.grade || \'\';\n      const action = r.dataset.action || \'\';\n\n      let show = false;\n      if (key === \'india\') show = sec.includes(\'india\');\n      else if (key === \'us\') show = sec.includes(\'us\');\n      else if (key === \'grade-a\') show = grade === \'a\';\n      else if (key === \'grade-b\') show = grade === \'b\';\n      else if (key === \'grade-c\') show = grade === \'c\';\n      else if (key === \'add\') show = action === \'add\';\n      else if (key === \'exit\') show = action === \'exit\';\n      else if (key === \'watch\') show = sec === \'watch\';\n      r.style.display = show ? \'\' : \'none\';\n    });\n\n    hideSectionsWithNoVisibleRows();\n  }\n\n  function hideSectionsWithNoVisibleRows() {\n    const tbody = document.getElementById(\'stock-tbody\');\n    const children = Array.from(tbody.children);\n    let lastSection = null;\n    let hasVisible = false;\n\n    children.forEach(row => {\n      if (row.classList.contains(\'section-row\')) {\n        if (lastSection) lastSection.style.display = hasVisible ? \'\' : \'none\';\n        lastSection = row;\n        hasVisible = false;\n      } else if (row.classList.contains(\'stock-row\')) {\n        if (row.style.display !== \'none\') hasVisible = true;\n      }\n    });\n    if (lastSection) lastSection.style.display = hasVisible ? \'\' : \'none\';\n  }\n\n  const saved = localStorage.getItem(\'view\');\n  if (saved === \'cards\') setView(\'cards\');\n</script>\n\n<script src="auth.js"></script>\n</body>\n</html>\n');
</script>
