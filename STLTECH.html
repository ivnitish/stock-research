document.getElementById('content').innerHTML=marked.parse('# Sterlite Technologies Ltd (STLTECH.NS) — Investment Thesis\n\n**Status:** OWNED (entry ~₹333 avg, current ₹200, **-40% P&L**)\n**Quality Score:** 12/25 (Grade C: Watch — Turnaround in Progress)\n**Last Updated:** 2026-03-12\n**Data Source:** Screener.in + yfinance\n\n---\n\n## 1. Business Summary\n\nSterlite Technologies (STL) makes optical fiber cables — the physical infrastructure for 5G, broadband, and data centers. Also runs a services arm (network design, build, manage). Headquartered in Pune. Promoter: Vedanta group (Agarwal family).\n\n**Why you bought it:** 5G rollout + BharatNet broadband + data center boom = massive fiber demand. STL as domestic leader was the thesis.\n\n**What went wrong:** A global fiber glut from COVID-era overbuilding crashed fiber prices by 60%+. India telecom capex slowed. STL had projects at bad margins. Revenue collapsed ₹6,925 Cr (FY23) → ₹3,996 Cr (FY25) and the company went loss-making.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 2 | Optical fiber cable is commoditized globally. STL competes on price + relationships. No structural moat. Moving into services (managed networks) to build stickiness, but early. |\n| Management | 3 | Vedanta group backing — deep pockets but also debt-heavy parent. Management navigated a difficult 2 years without bankruptcy. Promoter 44.45%, stable. |\n| Financials | 2 | ROCE 2.86%, ROE -6.28%. Loss-making FY24 (-₹57 Cr) and FY25 (-₹123 Cr). CFO positive (₹348 Cr FY25) — good sign. Debt manageable at D/E ~0.35. |\n| Growth Runway | 3 | India fiber demand story is real (BharatNet Phase 3, 5G densification, data centers). But global glut means pricing power is limited. Recovery is happening, not certain. |\n| Valuation | 2 | Forward P/E 32.6x on near-zero earnings is pricing in significant recovery. Market cap ₹9,794 Cr vs revenue ₹4,000 Cr. EV/Sales ~2.5x. Not cheap for a near-breakeven business. |\n| **Total** | **12/25** | **Grade C: Watch** |\n\n---\n\n## 3. What Happened and Where Things Stand\n\n### The Fiber Glut (Why Revenue Collapsed)\n\n| Year | Revenue (₹ Cr) | Net Profit (₹ Cr) | OPM% |\n|------|---------------|------------------|------|\n| FY21 | 4,825 | 265 | 17% |\n| FY22 | 5,437 | 45 | 12% |\n| FY23 | 6,925 | 127 | 13% |\n| FY24 | 4,083 | **-57** | 12% |\n| FY25 | 3,996 | **-123** | 10% |\n\nRevenue fell 42% from peak. Chinese manufacturers dumped fiber globally, prices crashed. STL lost pricing power.\n\n### The Tentative Recovery (Recent Quarters)\n\n| Quarter | Revenue (₹ Cr) | Net Profit (₹ Cr) | OPM% |\n|---------|---------------|------------------|------|\n| Jun 2024 | 872 | -48 | 7% |\n| Sep 2024 | 1,074 | -14 | 11% |\n| Dec 2024 | 998 | -24 | 11% |\n| Mar 2025 | 1,052 | -40 | 12% |\n| **Jun 2025** | **1,020** | **+10** | **13%** |\n| **Sep 2025** | **1,034** | **+4** | **12%** |\n\n**First profits in 2 years in Jun-Sep 2025.** OPM recovering (7% → 13%). This is why the stock rallied from ₹58 to ₹200.\n\n### The Stock Has Already Priced In Much of the Recovery\n\n| | Value |\n|---|---|\n| Your entry price | ~₹333 |\n| 52-week low | ₹58.86 |\n| Current price | ₹200.7 |\n| 52-week high | ₹205.73 |\n| Recovery from low | **+241%** |\n| Your P&L | **-40%** |\n\nThe market has already rewarded the early signs of recovery. You missed buying at the bottom, and the stock has now re-rated from distress pricing to "recovery pricing." The easy trade is done.\n\n---\n\n## 4. Valuation\n\n### What the Market is Pricing In\n\nAt ₹200 with forward P/E 32.6x:\n- Market expects FY27 EPS of ~₹6/share (vs current near-zero)\n- At ₹6 EPS × 48.8 Cr shares = ₹293 Cr PAT in 2 years\n- That requires OPM to expand to 14-15% on ₹5,000+ Cr revenue\n\nIs ₹5,000 Cr revenue achievable? In FY23 they did ₹6,925 Cr. If fiber pricing normalizes and BharatNet/data center orders come through, possible. But not guaranteed.\n\n### Scenario Analysis\n\n| Scenario | Revenue FY27 | OPM% | PAT (₹ Cr) | P/E | Target Price | vs ₹200 |\n|----------|-------------|------|-----------|-----|-------------|---------|\n| Bear (recovery stalls, glut continues) | ₹4,000 | 9% | Break-even | 20x | ₹20 | **-90%** |\n| Base (gradual recovery) | ₹5,200 | 13% | ₹260 | 28x | ₹149 | **-25%** |\n| Bull (BharatNet + data center surge) | ₹6,500 | 16% | ₹520 | 35x | ₹373 | **+86%** |\n\n**The base case is below current price.** The forward P/E of 32.6x is pricing in the bull case. There is asymmetric downside if the recovery is slower than expected.\n\n### Cash Flow (Positive Signal)\n| Year | CFO (₹ Cr) | Capex (₹ Cr) | FCF (₹ Cr) |\n|------|-----------|-------------|-----------|\n| FY23 | 228 | 56 | 172 |\n| FY24 | 791 | 211 | **580** |\n| FY25 | 348 | 295 | 53 |\n\nCFO has been positive throughout the loss period — losses are accounting/depreciation-driven, not cash losses. This is the main bullish signal.\n\n---\n\n## 5. Shareholding\n\n| Category | Percentage |\n|----------|-----------|\n| Promoters | 44.45% |\n| FIIs | 10.93% |\n| DIIs | 11.04% |\n| Public | 33.56% |\n\nPromoter holding stable. FII/DII rebuilding positions — they\'re noticing the recovery.\n\n---\n\n## 6. Hold or Exit? — The Core Question\n\n**Argument to HOLD:**\n- Recovery is underway (first profitable quarters in 2 years)\n- CFO positive throughout — no cash crisis\n- BharatNet Phase 3, data center fiber demand are real catalysts\n- Cutting at -40% locks in a permanent loss; the thesis (fiber demand) hasn\'t broken\n\n**Argument to EXIT:**\n- Stock has already rallied 3.4x from bottom — recovery largely priced in\n- Base case fair value is ₹149 — below current ₹200\n- No structural MOAT — just a cyclical recovery play\n- Capital could be redeployed into higher-quality businesses with more predictable earnings\n- The rally from ₹58 to ₹200 is done; next leg requires earnings to actually materialize\n\n**Verdict: Weak Hold, Watchlist for Exit**\nDo not sell in panic. But the easy money from the recovery is made. If Sep 2025 quarterly profit (₹4 Cr) is followed by Dec 2025 showing ₹20+ Cr, the recovery is real and hold. If profits disappoint in the next 2 quarters, this becomes a sell. Set a mental stop: if OPM falls back below 10% for 2 consecutive quarters, exit.\n\n---\n\n## 7. Risks\n\n| Risk | Probability | Impact |\n|------|-------------|--------|\n| Fiber glut continues, pricing doesn\'t recover | Medium | High — revenue stays depressed |\n| BharatNet delays (government project) | High | Medium — this is a perennial risk |\n| Vedanta parent stress (Agarwal group debt) | Low | Medium — potential liquidity pressure |\n| Competition from Chinese imports intensifies | Medium | High — no tariff protection currently |\n| Recovery slower than market expects (forward P/E wrong) | Medium | High — 20-30% downside |\n\n---\n\n## 8. Exit Triggers\n\n- [ ] OPM falls below 10% for 2 consecutive quarters after Jun 2025 → EXIT\n- [ ] Management guidance on FY27 revenue comes in below ₹5,000 Cr → reassess\n- [ ] Promoter selling stake → EXIT immediately\n- [ ] Better use of capital identified (redeploy into higher-conviction opportunity)\n- [ ] Stock falls back below ₹150 without fundamental reason → investigate\n\n---\n\n## 9. Decision History\n\n| Date | Action | Price | Reasoning |\n|------|--------|-------|-----------|\n| (Historical) | BUY | ~₹333 avg | 5G/broadband fiber demand, BharatNet beneficiary |\n| 2026-03-12 | HOLD | ₹200 | Recovery underway but priced in; watch next 2 quarters |\n\n---\n\n## 10. Research Log\n\n### 2026-03-12 — Initial thesis\n- Revenue crashed 42% (FY23→FY25) due to global fiber glut and India telecom capex slowdown\n- Now turning profitable: Jun-Sep 2025 first profits in 2 years (+₹10 Cr, +₹4 Cr)\n- Stock already rallied 241% from 52w low ₹58 to ₹200 — near 52-week high\n- CFO was positive even in loss years — losses are accounting, not cash\n- Verdict: Weak hold. Base case fair value ₹149 < current ₹200. If next 2 quarters show earnings momentum, re-rate to Hold. If not, exit and redeploy.\n- Quality Score: 12/25 (Grade C). Not a multi-bagger candidate at current price.\n');
