<script>document.getElementById("c").innerHTML=marked.parse("# Shakti Pumps (India) Ltd (SHAKTIPUMP.NS) — Investment Thesis\n\n**Status:** OWNED (200 shares, ₹1.04L invested, ~7% of portfolio)\n**Quality Score:** 16/25 (Grade B: Moderate Conviction)\n**Last Updated:** 2026-03-12 | **Source:** Screener.in + Groww MCP\n**Entry:** ₹518.95 avg | **CMP:** ₹526 | **P&L:** +1.41%\n\n---\n\n## 1. Business Summary\n\nManufacturer of pumps, motors, and controllers. Primary catalyst: **PM-KUSUM scheme** — Government of India's ₹34,000 Cr program to solarize 35 lakh agricultural pumps. Shakti is a leading beneficiary as India's largest solar pump manufacturer. Also serves industrial, domestic, and export markets.\n\n**The thesis:** Government scheme creates guaranteed order flow. Solar pump conversion from diesel is irreversible (energy savings are too compelling). ROCE of 55% means every rupee of government capital deployed generates exceptional returns.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score | Notes |\n|-----------|-------|-------|\n| MOAT | 2 | Pumps are competitive. No pricing power beyond government tender wins. Moat is scale and scheme relationships, not product differentiation. |\n| Management | 3 | Promoter 50.34%, declining from 56% over 3 years — concerning. But ROCE 55% shows exceptional capital efficiency. |\n| Financials | 4 | ROE 42.6%, ROCE 55.3% — outstanding. Revenue 3Y CAGR 29%. Profit 5Y CAGR 99%. OPM 24%. |\n| Growth Runway | 4 | PM-KUSUM has ₹34,000 Cr undisbursed. Target 35 lakh pumps, only ~5 lakh done. Long runway. |\n| Valuation | 3 | P/E 19.7x, P/B 3.98x. Reasonable for 99% profit CAGR. But scheme dependency is a risk to premium. |\n| **Total** | **16/25** | **Grade B** |\n\n---\n\n## 3. Financials\n\n| Year | Revenue (₹Cr) | Net Profit (₹Cr) | EPS | OPM% |\n|------|--------------|-----------------|-----|------|\n| FY22 | 1,179 | 65 | ₹5.88 | — |\n| FY23 | 968 | 24 | ₹2.19 | — |\n| FY24 | 1,371 | 142 | ₹11.79 | — |\n| FY25 | 2,516 | 408 | ₹33.97 | 24% |\n| TTM | 2,505 | 329 | ₹27.15 | 20% |\n\n**5Y Revenue CAGR: 46% | 5Y Profit CAGR: 99%**\n\n### Quarterly Trend\n| Quarter | Revenue | OPM% | EPS |\n|---------|---------|------|-----|\n| Q2 FY25 | ₹666 Cr | 20% | ₹7.35 |\n| Q3 FY25 | ₹622 Cr | 23% | ₹8.06 |\n| Q1 FY25 | ₹665 Cr | 25% | ₹9.17 |\n| Q4 FY24 | ₹649 Cr | 24% | ₹8.66 |\n\nMargins compressing slightly from 24%→20% (TTM) — watch.\n\n### Key Ratios\n- D/E: Low (not disclosed but manageable)\n- ROE: 42.6% | ROCE: 55.3%\n- Debtor Days: 152 (high — government receivables slow)\n- Promoter: 50.34% (declining from 56%)\n\n---\n\n## 4. Key Risk: Scheme Dependency\n\nPM-KUSUM is 70%+ of revenue. If the scheme is delayed (budget cuts, political change), revenue can drop sharply — FY23 showed this (revenue fell from ₹1,179Cr to ₹968Cr when scheme disbursements slowed).\n\n**Mitigation:** Industrial + export diversification growing. Government has committed to scheme through 2026.\n\n---\n\n## 5. Exit Triggers\n- [ ] PM-KUSUM disbursements pause for 2+ quarters\n- [ ] OPM drops below 16% consistently\n- [ ] Promoter below 45%\n- [ ] Debtor days exceed 200 (government not paying)\n\n---\n\n## 6. Research Log\n### 2026-03-12 — Initial thesis\n- Discovered via Groww MCP: 200 shares, ₹1.04L, +1.41%\n- Excellent ROCE (55%) but scheme-dependent revenue is a single-point risk\n- TTM OPM compression (24%→20%) worth monitoring\n- Hold — thesis intact. Government scheme still disbursing.\n")</script>
