document.getElementById('content').innerHTML=marked.parse("# Raymond Ltd (RAYMOND.NS) — Investment Thesis\n\n**Status:** OWNED (150 shares, ₹55.3K invested, ~4% of portfolio)\n**Quality Score:** 16/25 (Grade B: Moderate Conviction — pure-play engineering transformation)\n**Last Updated:** 2026-03-14 | **Source:** Screener.in + Web Research\n**Entry:** ₹368.75 avg | **CMP:** ₹372 | **P&L:** ~+0.9%\n\n---\n## Quick Summary\n\n**One-line thesis:** Post-double-demerger, Raymond Ltd is now a pure-play precision engineering company with two high-growth verticals — aerospace/defence (49% YoY growth, long-term contracts with Pratt & Whitney and Safran) and auto/EV components — trading at ~9.5x EV/EBITDA vs peers at 40x+, with a ₹1,000 Cr capacity expansion underway in Andhra Pradesh.\n\n**Action:** HOLD — consider upgrading to ADD on dips below ₹350\n\n| Level | Price | Trigger |\n|-------|-------|---------|\n| Buy / Add | ₹330–₹360 | On broader market dip; thesis intact; pure-play de-rating from prior confusion |\n| Hold | ₹360 – ₹450 | Current range — let aerospace ramp-up play out; re-rating toward 15–18x EV/EBITDA underway |\n| Sell / Exit | Above ₹500+ or thesis break | If aerospace contracts stall; if new management dilutes engineering focus; if debt exceeds ₹800 Cr |\n\n**Why now (Mar 2026):** The market has not re-rated Raymond fast enough. The demerger confusion (old \"real estate stub\" narrative) persists despite Raymond Realty having been demerged separately in May 2025. RAYMOND.NS is now a clean engineering company, and its aerospace segment is growing at 49% YoY with long-term OEM contracts. The valuation gap vs MTAR Tech, Paras Defence, and Azad Engineering (all trading at 40x+ EV/EBITDA) is a material mis-pricing.\n\n---\n\n## 1. Business Summary — IMPORTANT STRUCTURAL UPDATE\n\n> **The thesis has changed materially since initial research (March 2026).** Two demergers have occurred:\n> 1. **Raymond Lifestyle** demerged (FY24) — textiles, apparel, \"The Complete Man\" brand → now separately listed\n> 2. **Raymond Realty** demerged (effective May 1, 2025; listed July 1, 2025) — Thane land bank → now separately listed as RAYMONDREL\n\n**What remains in RAYMOND.NS today is a pure-play engineering company**, organized into two subsidiaries:\n\n| Subsidiary | Business | Revenue Share (FY26) |\n|---|---|---|\n| JK Maini Precision Technology Ltd | Auto components, EV parts, steel files | ~84% of revenue |\n| JK Maini Global Aerospace Ltd (JKMGAL) | Aero-engine components, defence precision parts | ~16% of revenue |\n\nThe lifestyle and real estate businesses that previously dominated discussion of \"Raymond\" have been fully separated. The remaining entity is an engineering conglomerate with two high-growth verticals.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score | Notes |\n|-----------|-------|-------|\n| MOAT | 3 | Long-term OEM supply agreements with GE, Rolls-Royce, Pratt & Whitney, Safran create switching-cost moat. JKMGAL approved as Tier-1 supplier to global engine OEMs — a certification barrier that takes years to achieve. Auto components more commoditized. |\n| Management | 3 | Post-demerger, management is focused purely on engineering. Gautam Singhania still present but JK Maini (Gautam Maini) runs the aerospace vertical effectively. Net debt-free with ₹214 Cr cash surplus. Concern: promoter still declining at parent Raymond. |\n| Financials | 3 | Q3 FY26: Revenue ₹580 Cr (+17.8% YoY), EBITDA ₹83 Cr (margin 14.3%, +100bps YoY). Net debt-free. Aerospace EBITDA margin 21% and expanding. Real, clean operating earnings now — no more demerger distortions. |\n| Growth Runway | 4 | Aerospace growing at 34–49% YoY. ₹1,000 Cr Andhra Pradesh investment creating capacity for FY27-28 ramp. Long-term supply agreements locked. Global aerospace supercycle (Boeing/Airbus backlogs of 12,000+ aircraft). China+1 tailwind for sourcing diversification. |\n| Valuation | 3 | EV/EBITDA ~9.5x vs peers at 40x+. P/B below 1x. The discount exists because the market hasn't re-rated the transformation yet. Not expensive — but not \"steal\" cheap either given execution risk on new capacity. |\n| **Total** | **16/25** | **Grade B — Moderate Conviction** |\n\n**Score change from 11/25 (Grade C) to 16/25 (Grade B):** The aerospace angle is a genuine re-rating catalyst, not noise. The realty demerger eliminates the distorted financials issue entirely.\n\n---\n\n## 3. The Demerger Cleanup — What Changed\n\nThe reported financials were deeply misleading through FY25. That is now resolved:\n\n| Period | Revenue | Net Profit | What it is |\n|--------|---------|-----------|------------|\n| FY23 | ₹8,215 Cr | ₹537 Cr | Old Raymond (pre-Lifestyle demerger) |\n| FY24 | ₹973 Cr | ₹1,643 Cr | Includes ₹1,719 Cr demerger gains |\n| FY25 | ₹1,947 Cr | ₹7,636 Cr | Includes ₹7,741 Cr other income (demerger) |\n| **FY26 (ongoing)** | **~₹2,200–2,300 Cr annualized** | **Real ops, clean** | Pure engineering co. — both demergers complete |\n\nFrom Q2 FY26 onward, financial statements are clean. The ₹580 Cr quarterly revenue and 14.3% EBITDA margin represent real, ongoing engineering operations.\n\n---\n\n## 4. The Bull Case — Auto & EV Components\n\nRaymond's Precision Technology segment (JK Maini Precision Technology Ltd) manufactures:\n- Auto components — engine parts, transmission components\n- EV drivetrain components — growing with India and global EV adoption\n- Steel files (industrial) — mature, cash-generative\n- Aerospace-adjacent machined components\n\nQ2 FY26: Revenue ₹409 Cr (+9.9% YoY), EBITDA ₹57 Cr (+57.3% YoY), margin 13.9% (up sharply).\n\nThe EV component opportunity is medium-term: as EV adoption scales, Raymond's precision machining capabilities transfer to EV drivetrains. This is incremental upside, not the primary re-rating catalyst today.\n\n---\n\n## 4a. Defence/Aerospace Angle — PRIMARY RE-RATING CATALYST\n\n### What the Business Actually Does\n\nRaymond entered aerospace in 2023 via the acquisition of **Maini Precision Products Limited (MPPL)**, which contained an existing aerospace division. This was restructured into **JK Maini Global Aerospace Ltd (JKMGAL)**, a wholly-owned subsidiary (66.3% Raymond-owned, remaining held by Maini family and minority shareholders).\n\nJKMGAL manufactures:\n- **Precision aero-engine components** — complex machined parts for jet engines\n- Key product: **Nozzle Guide Vanes** for LEAP-1A engines (each aircraft engine contains ₹17–29 Lakh worth of Raymond-made components)\n- **Low-pressure turbine components**, fan blades, and other hot-section engine parts\n- Approved Tier-1 supplier to GE, Rolls-Royce, Pratt & Whitney, Safran, Airbus, HAL\n\n### Revenue Trajectory\n\n| Quarter | Aerospace & Defence Revenue | YoY Growth | EBITDA | Margin |\n|---|---|---|---|---|\n| Q3 FY25 | ₹70 Cr | — | ₹14 Cr | 20% |\n| Q1 FY26 | ₹87 Cr | +37% | ~₹18 Cr | ~21% |\n| Q2 FY26 | ₹81 Cr | +15% | ₹17 Cr | 21% |\n| Q3 FY26 | ₹105 Cr | **+48.9%** | ₹19 Cr | 18.1% |\n\nAnnualizing Q3 FY26 run-rate: ~₹400–420 Cr/year and accelerating.\nAerospace is ~16% of total revenue today but growing far faster than the auto segment.\n\n### Long-Term OEM Contracts — The Moat\n\nRaymond signed long-term supply agreements with:\n- **Pratt & Whitney** (GTF engine family — powers Airbus A320neo, A220)\n- **Safran Engines** (CFM56/LEAP — powers Boeing 737 MAX, Airbus A320neo)\n- Existing: **GE** (LEAP-1A/1B), **Rolls-Royce**, **HAL**\n\nThese are not spot purchase orders. OEM supply agreements in aerospace are typically 5–10 year frameworks with pre-negotiated volumes and pricing. Once certified as a Tier-1 supplier, switching costs are extremely high — OEMs require re-certification (18–24 months, \$2–5M cost) to change suppliers for flight-critical parts. This is a durable moat.\n\n### The ₹1,000 Crore Andhra Pradesh Capacity Investment\n\n**Announced October 2025, AP government approved:**\n- **JKMGAL** (aerospace): ₹510 Cr investment, 47-acre campus at Gudipalli, Sri Satya Sai District\n  - First aerospace-specific plant under Andhra Pradesh's new Aerospace Policy\n  - Dedicated low-pressure turbine manufacturing capability\n  - 1,400 direct jobs; commercial production target: May 2027\n  - AP govt incentives: ~₹380 Cr (land, utilities, capital subsidies)\n- **JK Maini Precision Technology** (auto): ₹430 Cr investment, 4,096 jobs\n\nTotal: ₹940–1,000 Cr commitment, with capacity coming online by FY28.\n\nThis investment effectively doubles the aerospace manufacturing footprint. At 21% EBITDA margins, the incremental revenue from this plant could add ₹200–250 Cr/year EBITDA at maturity (FY28–29).\n\n### Why This Is a Meaningful Catalyst\n\n1. **Revenue growth rate**: 37–49% YoY in a business that is already ₹400 Cr annualized. That is not a rounding error.\n2. **Margin profile**: Aerospace earns 21% EBITDA vs 13.9% for auto. As aerospace grows as a share of mix, blended margins expand.\n3. **Valuation gap**: MTAR Technologies, Paras Defence, Data Patterns, Azad Engineering all trade at 35–50x EV/EBITDA. Raymond's aerospace business embedded in a holding company at 9.5x is structurally undervalued.\n4. **Global supercycle**: Boeing and Airbus have combined backlogs of 12,000+ aircraft (13–14 years of production). Engine OEMs are capacity-constrained. India's China+1 sourcing trend is benefiting Indian precision manufacturers directly.\n5. **Institutional recognition**: Nirmal Bang, TradeKaizen, and multiple brokerages have noted the defence/aerospace re-rating angle as of Aug–Sep 2025.\n\n### Comparison with Peer Defence/Aerospace Stocks\n\n| Company | Specialty | EV/EBITDA | Revenue (FY26 est) |\n|---|---|---|---|\n| MTAR Technologies | Nuclear + clean energy + defence precision parts | ~35–40x | ₹600 Cr |\n| Paras Defence | Defence electronics, optics, space | ~35–45x | ₹350 Cr |\n| Data Patterns | Defence electronics, radar | ~40–50x | ₹500 Cr |\n| Azad Engineering | Aero-engine precision (closest peer) | ~40–43x | ₹400 Cr |\n| **Raymond (JKMGAL only)** | **Aero-engine precision, Tier-1 OEM** | **~9.5x (whole co.)** | **~₹420 Cr (aero only)** |\n\nRaymond's aerospace segment is most directly comparable to **Azad Engineering** — both are Tier-1 precision aero-engine component suppliers. Azad trades at 40–43x EV/EBITDA. Raymond's entire engineering company trades at 9.5x. Even if Raymond deserves a discount (mixed portfolio, smaller aerospace share, execution risk on new plant), the gap is extreme.\n\n**Bull case re-rating math:** If JKMGAL alone is valued at 20x EV/EBITDA on ₹420 Cr revenue × 20% margin = ₹84 Cr EBITDA × 20x = ₹1,680 Cr for aerospace alone. Raymond's entire market cap is ~₹2,500 Cr. Auto segment (₹1,600 Cr annualized revenue, 14% margin = ₹224 Cr EBITDA × 8x) = ₹1,792 Cr. Sum-of-parts: ₹3,472 Cr vs current ₹2,500 Cr market cap = 39% upside without growth assumptions.\n\n### Is It Meaningful? Yes — This Is the Primary Thesis Now\n\nThe old thesis (Thane land bank option value) is now in a separate company (RAYMONDREL). What remains in RAYMOND.NS is an engineering company where aerospace is the fast-growing, high-margin, moat-bearing segment. The defence/aerospace angle is not a minor footnote — it is the central re-rating catalyst.\n\n---\n\n## 5. Risks\n\n| Risk | Severity | Notes |\n|------|----------|-------|\n| Andhra Pradesh plant execution | Medium | ₹940 Cr capex, commercial production May 2027 — delivery risk is real |\n| Auto segment cyclicality | Medium | Auto components are 84% of revenue today; any auto downturn hurts near-term numbers |\n| OEM order variability | Low-Medium | Long-term agreements don't guarantee fixed volumes; ramp-ups can be slower than planned |\n| Promoter stake declining | Medium | Singhania family's declining stake is a governance concern; watch for pledging |\n| Pure-play aerospace peers | Low | If MTAR, Azad, etc. de-rate severely, Raymond's re-rating path becomes harder despite fundamentals |\n| Single customer concentration | Medium | GE, Pratt, Safran are the whole market — losing one OEM relationship would be material |\n\n---\n\n## 6. Action\n\n**HOLD, consider ADD on dips.** The thesis has materially improved. The valuation gap is large and the growth rate is validated (49% YoY in Q3 FY26). The primary risk is execution on the new Andhra Pradesh plant (FY27-28 timeline) and near-term auto softness.\n\nThis is no longer a \"demerger cleanup speculative position.\" It is a growth-oriented engineering stock in the early innings of an aerospace ramp. Grade upgrades from C to B.\n\n**Position sizing:** Current ~4% of portfolio is reasonable. Would add to 5–6% on dips below ₹350.\n\n---\n\n## 7. Exit Triggers\n\n- [ ] Aerospace revenue growth falls below 20% for 2 consecutive quarters\n- [ ] Andhra Pradesh plant delayed beyond FY28 or cancelled\n- [ ] Major OEM supply agreement terminated (GE, P&W, or Safran)\n- [ ] Promoter stake falls below 40% or significant pledging disclosed\n- [ ] New unrelated diversification depletes the engineering focus\n- [ ] P/E or EV/EBITDA re-rates to match peers (take profits at 20x+ EV/EBITDA)\n\n---\n\n## 8. Research Log\n\n### 2026-03-14 — Defence/aerospace business update\n\n**Major thesis revision.** Prior thesis was based on stale information — two demergers have now been completed:\n- Raymond Realty demerged May 2025 (listed July 1, 2025 as RAYMONDREL). Thane land bank is no longer in RAYMOND.NS.\n- Raymond Lifestyle demerged earlier (FY24). That business is also gone from this ticker.\n\n**RAYMOND.NS is now a pure engineering company** — no real estate, no textiles.\n\nKey findings from web research:\n- **Aerospace segment (JKMGAL)** is growing 37–49% YoY with Tier-1 OEM supply contracts (GE, Rolls-Royce, Pratt & Whitney, Safran, Airbus, HAL)\n- **Q3 FY26:** Aerospace revenue ₹105 Cr (+48.9% YoY), EBITDA margin 18–21%\n- **₹510 Cr aerospace plant** announced for Andhra Pradesh (47 acres, Gudipalli), production starting May 2027\n- **Long-term supply agreements** signed with Pratt & Whitney and Safran (announced ~Aug 2025)\n- **Valuation gap** vs Azad Engineering, MTAR Tech, Paras Defence (peers at 35–50x EV/EBITDA; Raymond at 9.5x) is the central re-rating opportunity\n- Net debt-free company with ₹214 Cr cash surplus as of Q3 FY26\n- Nirmal Bang, TradeKaizen bullish on aerospace re-rating angle (Aug–Sep 2025)\n\n**Quality Score upgraded from 11/25 (Grade C) to 16/25 (Grade B).**\n**Action upgraded from HOLD SMALL to HOLD / consider ADD on dips.**\n**Thesis updated from \"Thane land bank option\" to \"aerospace-led precision engineering growth play.\"**\n\n### 2026-03-12 — Initial thesis\n- Discovered via Groww MCP: 150 shares, ₹55.3K, +2.49%\n- This is the demerger stub — not the lifestyle/textile business\n- Real operational profit is ₹5-14 Cr/quarter — tiny for ₹2,518 Cr market cap\n- P/B 0.77x is the only value anchor — Thane land bank\n- Grade C 11/25. Hold small. Do not add.\n- **Note (retroactive):** This analysis was incomplete — missed the Raymond Realty demerger (May 2025) and the aerospace transformation. The \"stub\" narrative was outdated.\n");
