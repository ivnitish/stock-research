<script>document.getElementById("c").innerHTML=marked.parse('# Raymond Ltd (RAYMOND.NS) — Investment Thesis\n\n**Status:** OWNED (150 shares, ₹55.3K invested, ~4% of portfolio)\n**Quality Score:** 11/25 (Grade C: Low Conviction — demerger stub)\n**Last Updated:** 2026-03-12 | **Source:** Screener.in + Groww MCP\n**Entry:** ₹368.75 avg | **CMP:** ₹378 | **P&L:** +2.49%\n\n---\n\n## 1. Business Summary\n\n**IMPORTANT:** This is not the old Raymond (textiles + lifestyle). That business was demerged into Raymond Lifestyle Ltd (separate listed entity). What remains in RAYMOND.NS is the stub company holding:\n- **Raymond Realty** — real estate development in Thane (Maharashtra)\n- **Raymond Engineering** — engineering & auto components division\n\nThe lifestyle/apparel/retail business generating the famous "Raymond — The Complete Man" brand is now in **RAYMOND.NS** (the separately listed company). The P&L shown here is the holding company post-demerger.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score | Notes |\n|-----------|-------|-------|\n| MOAT | 2 | Real estate in Thane is location-specific, not a brand moat. Engineering is commodity-ish. |\n| Management | 2 | Gautam Singhania-led. Promoter 48.87% declining. FIIs selling (16.72%→11%). Earnings massively inflated by demerger "other income" — not real operational profit. |\n| Financials | 2 | Operational quarterly profit: ₹5-14 Cr. ROCE 1.64%. P/B 0.77x (below book = value or distress). Revenue declining 32% 3Y CAGR (because lifestyle demerged). |\n| Growth Runway | 2 | Thane real estate has demand. Engineering is steady. But this is a small, unfocused stub. |\n| Valuation | 3 | P/B 0.77x is genuinely below book. P/E 13.3x looks cheap but based on inflated "other income." |\n| **Total** | **11/25** | **Grade C** |\n\n---\n\n## 3. The Demerger Confusion\n\nThe reported financials are deeply misleading:\n\n| Period | Revenue | Net Profit | What it is |\n|--------|---------|-----------|------------|\n| FY23 | ₹8,215 Cr | ₹537 Cr | Old Raymond (pre-demerger) |\n| FY24 | ₹973 Cr | ₹1,643 Cr | Includes ₹1,719 Cr demerger gains |\n| FY25 | ₹1,947 Cr | ₹7,636 Cr | Includes ₹7,741 Cr other income |\n| **Real quarterly ops** | ~₹540 Cr | ~₹5-14 Cr | Actual ongoing business |\n\nThe "profit" is paper gains from the demerger. Real operational business makes ₹5-14 Cr/quarter on ₹530-560 Cr revenue. That\'s 1-2.5% net margin — not a quality business.\n\n---\n\n## 4. The Bull Case (Thane Real Estate)\n\nRaymond\'s main asset is 100+ acres of prime Thane land. As real estate development progresses:\n- FY26-28 revenue recognition from Thane projects could be material\n- P/B 0.77x means you\'re buying the land at a discount to stated book value\n- If Thane projects deliver ₹500+ Cr real profit in 3-4 years, current market cap (₹2,518 Cr) looks cheap\n\n**But:** Real estate execution risk is high. Thane land value is real; delivery timelines are uncertain.\n\n---\n\n## 5. Action\n\n**Hold small position.** P/B 0.77x provides book value floor. Thane real estate is the option value. But do not add — this is a distressed-ish stub with poor current earnings visibility.\n\n**Consider exiting if:** Thane project milestones slip, or better opportunities arise.\n\n---\n\n## 6. Exit Triggers\n- [ ] Thane development delays beyond FY27\n- [ ] Promoter below 45%\n- [ ] Any new debt issuance > ₹500 Cr\n- [ ] P/B re-rates above 1.2x (exit at fair value)\n\n---\n\n## 7. Research Log\n### 2026-03-12 — Initial thesis\n- Discovered via Groww MCP: 150 shares, ₹55.3K, +2.49%\n- This is the demerger stub — not the lifestyle/textile business\n- Real operational profit is ₹5-14 Cr/quarter — tiny for ₹2,518 Cr market cap\n- P/B 0.77x is the only value anchor — Thane land bank\n- Grade C 11/25. Hold small. Do not add.\n')</script>
