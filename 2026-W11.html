document.getElementById('content').innerHTML=marked.parse('# Weekly Review — W11 2026 (Mar 9-15)\n\n**Date:** 2026-03-12\n**Portfolio Value (India):** ~₹10.2L invested | **US:** ~₹1.5L (₹50K × 3)\n**Total Cost Basis:** ~₹11.7L\n\n---\n\n## 1. Portfolio State\n\n### India — Open Positions\n\n| Ticker | Cost | Approx CMP | P&L | Grade | Action |\n|--------|------|------------|-----|-------|--------|\n| GROWW | ₹3.0L (reduced) | ₹155 | +2% | B·19/25 | Hold |\n| KAYNES | ₹1.32L | ₹3,800 | -11% | B·17/25 | Hold — watch promoter |\n| EPACKPEB | ₹1.03L | ₹160 | -30% | B·17/25 | Hold — Q4 FY26 key |\n| KERNEX | ₹1.01L | ₹1,020 | -9% | B·18/25 | Hold — order book intact |\n| ARTEMISMED | ₹44.5K | ₹230 | -6.5% | B·16/25 | Hold |\n| PARADEEP | ₹38.7K | ₹108 | -38% | C·11/25 | Exit on bounce |\n| NAVA | ₹22K | — | — | B·16/25 | Hold |\n| BANCOINDIA | ₹59K | — | — | B·— | Hold |\n| SHILCTECH | ₹27.4K | — | — | B·— | Hold |\n| STLTECH | ₹46.8K | ₹200 | -40% | C·12/25 | Weak Hold |\n| ETERNAL | ₹33.7K | ₹221 | -33% | B·15/25 | Hold — Q4 review |\n| SWIGGY | ₹27.7K | ₹281 | -48% | C·10/25 | Weak Hold |\n\n### US — Open Positions\n\n| Ticker | Cost | Grade | Thesis |\n|--------|------|-------|--------|\n| GOOGL | ₹50K | A·23/25 | Search + Cloud, PEG 0.92, High conviction |\n| AMZN | ₹50K | A·21/25 | AWS + Ads, SOTP $290 vs $212, +36% |\n| NVDA | ₹50K | A·22/25 | AI monopoly, CUDA moat, fwd P/E 17x |\n\n---\n\n## 2. Decision Log Pattern Analysis (Apr 2024 — Feb 2026)\n\n### Data: 468 transactions | 267 buys | 201 sells | 150+ unique stocks\n\n### Realized P&L Summary\n\n- **Total realized P&L on closed positions:** **-₹64,800**\n- **Profitable closed trades:** ~60 (mostly small gains: +1-10%)\n- **Loss closed trades:** ~35 (range: -0.5% to -36.6%)\n- **Biggest realized losses:** SILVERBEES (-₹59K, -14.7%), IZMO (-₹18.5K, -10.2%), UNIMECH (-₹13.5K, -24.2%), RTNINDIA (-₹10.9K, -25.1%), NETWEB (-₹15.6K, -7.9%)\n- **Biggest realized wins:** ASTERDM (+₹21.3K, +74%), OIVL (+₹17.6K, +47%), HERITGFOOD (+₹15K, +21%)\n\n### Pattern 1: Too Many Positions — Theme Chasing Without Moat Check\n\n**The problem:** 150+ unique stocks touched in 22 months. At this scale, no single position gets proper diligence. The portfolio reads like a thematic ETF shopping list:\n- Power theme: SUZLON, INOXWIND, NHPC, IREDA, SWSOLAR, KPEL, JPPOWER, RTNINDIA, GENUSPOWER\n- Defence/PSU: GRSE, MAZDOCK, COCHINSHIP, KERNEX, RVNL, IRCON, NBCC, BHEL, HUDCO\n- Railways: KERNEX, TEXRAIL, RVNL, IRCON\n- Fiber/Telecom: STLTECH, HFCL, RPPINFRA\n- Fintech: GROWW, PAYTM, UGROCAP, RBLBANK\n- EMS: KAYNES, NETWEB, EIMCOELECO\n\n**Munger would say:** "Diversification is protection against ignorance. It makes little sense if you know what you\'re doing." With 150 stocks, nothing gets real conviction.\n\n**Better approach:** Max 15 positions. Deep work on each. Every entry needs a written thesis before buying.\n\n### Pattern 2: Sold Winners Too Early, Held Losers Too Long\n\nThe closed position P&L distribution is stark:\n- **Winners were small:** Most profitable exits were +1-10%. The one big win (ASTERDM +74%) was a small ₹28K position.\n- **Losers are big:** STL (open, -40%), SWIGGY (open, -48%), EPACK (open, -30%), PARADEEP (open, -38%). These were held through massive drawdowns without thesis review.\n- **Root cause:** No pre-defined exit triggers. Trades were entered without a stop or a "what would change my mind" framework.\n\n### Pattern 3: IPO Bias Creates Overvalued Entries\n\n- SWIGGY: Bought at IPO ₹390 (now ₹281, -28%). IPO investors pay a freshness premium.\n- BLUESTONE: IPO entry, exited near flat (-0.1%). Lucky.\n- OLAELEC: Bought IPO at ₹73 avg, exited at -4.8%. EV hype trade with no moat.\n\n**Pattern:** IPOs are designed for sellers, not buyers. When a company IPOs at maximum valuation with maximum hype, it\'s usually the worst time to buy. SWIGGY at ₹390 IPO vs current ₹281 is the clearest example.\n\n**Better approach:** Wait 6-12 months post-IPO. Let the hype deflate and the first 1-2 earnings cycles show real performance. The business doesn\'t change — only the price does.\n\n### Pattern 4: Cyclicals Bought at the Wrong Point in the Cycle\n\n- PARADEEP: Bought fertilizer at peak phosphoric acid cycle → now -38%\n- STLTECH: Bought fiber at peak demand narrative → revenue collapsed -42% as fiber glut set in\n- SUZLON, INOXWIND: Bought renewable energy at peak order inflow excitement → small gains but barely broke even (+0.8%, +0.9%)\n\n**Pattern:** Cyclicals require cycle-timing. Buying a commodity/cyclical at peak earnings multiples is a mistake. When everyone is bullish on a sector and the stock is "cheap on P/E" using peak earnings — the P/E is lying. Normalised earnings are lower.\n\n**Better approach (Munger):** Don\'t buy cyclicals at all unless the moat is structural, not just cyclical tailwind. STLTECH has no moat — just commodity fiber. PARADEEP has no moat — just a port location in a regulated sector.\n\n### Pattern 5: High-Quality Exits and Low-Quality Holds (Backwards)\n\nLooking at what was exited profitably vs what\'s still held at losses:\n\n| Sold at profit | Still holding at loss |\n|---|---|\n| ASTERDM (+74%) | SWIGGY (-48%) |\n| HERITGFOOD (+21%) | STLTECH (-40%) |\n| OIVL (+47%) | PARADEEP (-38%) |\n| GODFRYPHLP (+7.5%) | ETERNAL (-33%) |\n\nThe sells show better stock-picking instinct than the holds. The problem is behavioural: selling winners (locking in gains feels good) while holding losers (avoiding realising a loss feels necessary). Classic loss aversion bias.\n\n**Better approach:** Grade holdings quarterly. Anything Grade C that hasn\'t improved thesis in 2 quarters: exit regardless of P&L. Reframe: "if I had cash, would I buy this today?" If no → sell.\n\n### Pattern 6: Position Sizing was Inverted\n\nThe largest positions are not the highest-conviction ones:\n\n| Stock | Cost Basis | Grade Now |\n|-------|-----------|-----------|\n| KAYNES | ₹9.06L (total bought) | B·17 |\n| GROWW | ₹6.80L (total bought) | B·19 |\n| SUZLON | ₹5.34L (bought, then exited) | — |\n| SILVERBEES | ₹4.03L | Exited -14.7% |\n| EPACKPEB | ₹1.03L | B·17 |\n\nKAYNES got 10 buy transactions — the largest single stock. This was reasonable (thesis is intact). But SILVERBEES (unknown company, ₹4L invested, no thesis file) had the 3rd largest position and was exited at -14.7%.\n\n**Better approach:** Position size = conviction × margin of safety. Grade A = up to 15% of portfolio. Grade B = 5-10%. Grade C = 0-5% (hold existing; no new buys).\n\n---\n\n## 3. Current Portfolio Action Items\n\n### Immediate (before Q4 FY26 results in Apr-May 2026)\n\n1. **EXIT candidate: PARADEEP** — Grade C 11/25. D/E 5.3x in a regulated commodity business. No moat. Currently -38%. If it bounces to ₹115-120 on any good news, sell. Target exit, not a hold.\n\n2. **WEAK HOLD with hard stop: STLTECH** — Base case fair value ₹149 < current ₹200. If Dec 2025 profit (coming soon) is below ₹15 Cr, thesis is breaking → exit.\n\n3. **WATCH: ETERNAL Q4 FY26** — Hold, but if Mar 2026 quarterly PAT < ₹39 Cr (Mar 2025 base), exit and redeploy into JUSTDIAL.\n\n4. **WATCH: SWIGGY Q4 FY26** — Hold, but if OPM worsens from -13%, exit.\n\n### Watchlist (ready to buy if capital freed from exits above)\n\n1. **JUSTDIAL** — BUY ₹526. SOTP floor. Operating business is free. Bear case +48%.\n2. **NESCO** — Watch for dip below ₹1,100. P/E 18.6x, 42% margins, Mumbai Expo optionality.\n3. **BALMER LAWRIE** — PSU with steady returns, P/E 10.8x, dividend yield.\n\n---\n\n## 4. Research Completed This Week\n\n- [x] GROWW v2 (peer comp + product optionality model)\n- [x] KAYNES v2 (Screener.in data, FCF analysis, promoter selling flag)\n- [x] STL thesis (Grade C, Weak Hold)\n- [x] ETERNAL thesis (Grade B, Hold)\n- [x] SWIGGY thesis (Grade C, Weak Hold)\n- [x] Just Dial thesis (Grade B, BUY)\n- [x] GOOGL / AMZN / NVDA US theses (all Grade A)\n- [x] Mar 2026 Watchlist screen (39 stocks)\n- [x] GitHub Pages site live: https://ivnitish.github.io/stock-research/\n- [x] vishalmdi composite skill installed\n\n## 5. Next Week Focus\n\n- [ ] PARADEEP exit decision (confirm exit if bounces)\n- [ ] STLTECH Dec 2025 results (watch for quarterly profit ≥ ₹15 Cr)\n- [ ] Nesco / Triveni / Balmer Lawrie mini-theses\n- [ ] Red flag monitor cron setup\n- [ ] KAYNES promoter selling — check BSE filings\n\n---\n\n*End of W11 review.*\n');
