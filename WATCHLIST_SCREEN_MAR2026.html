enue growing slowly (4.2%), earnings stable.\n\n**What is Balmer Lawrie?** Diversified PSU: industrial packaging (drums), logistics infrastructure (cold chain, warehouses), lubricants, travel services. ~₹2,889 Cr market cap.\n\n**Why it could be cheap:**\n- P/E 10.8x for a consistently profitable business = clear value\n- PSU with 80% government holding — not going anywhere\n- Dividends: PSUs often yield 3-5% at these valuations\n- Trading 29% below 52-week high\n\n**Key risks:** PSU capital allocation (government may redirect profits). Revenue growth is anaemic (4.2%). Not a growth story — pure value/dividend.\n\n**Quick valuation:**\n- Net profit ~₹300 Cr × 15x P/E = ₹4,500 Cr fair value vs ₹2,889 Cr current = **56% upside**\n- 20-30% margin of safety clearly present at current price\n\n**Verdict: Value + dividend play. Not a multi-bagger but solid 20-30% upside + dividends. Worth small position.**\n\n---\n\n### 3. Triveni Engineering — Corporate Action + Earnings Doubling\n\n**Why interesting:** P/E 25.9x, P/B 2.58x, earnings growth 97.9%, revenue growth 16.5%, forward P/E 19.4x. Corporate action: Power Transmission business demerger (275/share implied value).\n\n**What is Triveni Engineering?** Sugar + Power Transmission (gears, turbines, water treatment). The Power Transmission segment is high-quality, capital-light, and deserves a premium multiple. Sugar is cyclical.\n\n**The corporate action angle:**\n- Demerger of Power Transmission at ₹275/share book value\n- If Sugar is valued at 10x P/E and Power Transmission at 30x P/E (engineering specialty)\n- The combined value could be significantly higher than current market cap\n\n**Key risks:** Sugar is cyclical and government-controlled (FRP prices, ethanol policy). Demerger timeline unclear.\n\n**Verdict: Corporate action creates value unlock potential. Earnings doubling (97.9%) with forward P/E 19.4x is reasonable. Monitor demerger progress.**\n\n---\n\n## Action Plan\n\n| Stock | Action | Entry Range | Why |\n
