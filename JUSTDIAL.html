document.getElementById('content').innerHTML=marked.parse('# Just Dial Ltd (JUSTDIAL.NS) — Investment Thesis\n\n**Status:** WATCHING (not owned — potential buy)\n**Quality Score:** 17/25 (Grade B: Moderate Conviction — value entry)\n**Last Updated:** 2026-03-12\n**Data Source:** Screener.in + yfinance\n\n---\n\n## 1. Business Summary\n\nJust Dial is India\'s local search and discovery platform — think "Yellow Pages for India, but digital." Users search for plumbers, restaurants, doctors, CA firms, and 30M+ other local businesses across 250+ cities. Revenue model: subscriptions from businesses (paid listings) + performance ads.\n\n**The hidden story:** In 2021, Reliance Industries acquired a controlling 74%+ stake. Just Dial is now a Reliance subsidiary — a strategic local commerce asset for JioMart and the broader Jio ecosystem. The promoter is not a small entrepreneur; it\'s India\'s most powerful conglomerate.\n\n**Why is it down 50% from peak?** Growth has stalled (6.4% YoY), Google Maps/Instagram/Jio eat into the use case, and the market has given up on re-rating it. That\'s the opportunity.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 2 | Local search is under structural pressure from Google Maps, Instagram (business discovery), and Jio. 30M+ listed businesses is a moat of sorts, but switching costs are low. Revenue growth of 6.4% reflects this pressure. |\n| Management | 4 | Promoter is Reliance Industries at 74%+ — strongest possible backing. Governance is clean. FIIs have been steadily buying (4.87% → 7.82% in one year). No insider selling. |\n| Financials | 5 | Near debt-free (D/E 0.02x). ₹4,608 Cr investment portfolio. FCF positive (₹489 Cr in FY24). Net margin 46% (includes investment income). No dilution risk. Cash-fortress balance sheet. |\n| Growth Runway | 2 | Revenue growing only 6.4% — below inflation. Structural headwinds from Google/Jio. The operating business may be in slow decline. Reliance integration could re-accelerate, but timeline unknown. |\n| Valuation | 4 | P/E 7.8x. P/B 0.92x (below book). SOTP fair value ₹836-983/share vs ₹526 current = 59-87% upside. The investment portfolio alone nearly covers the market cap — operating business is mispriced. |\n| **Total** | **17/25** | **Grade B — Value Buy** |\n\n---\n\n## 3. The Core Thesis: You\'re Getting the Business for Free\n\nThis is a **sum-of-parts (SOTP) story**, not a growth story.\n\n### Balance Sheet Breakdown (FY24)\n\n| Asset | Value (₹ Cr) |\n|-------|-------------|\n| Investments (MFs, bonds, equity) | **₹4,608 Cr** |\n| Other assets | ₹253 Cr |\n| **Total Assets** | **₹4,861 Cr** |\n| Debt/Borrowings | ₹85 Cr |\n| **Net Investment Value** | **~₹4,523 Cr** |\n| **Current Market Cap** | **₹4,473 Cr** |\n\n**Market cap (₹4,473 Cr) ≈ Investment portfolio (₹4,608 Cr)**\n\nThis means the market is valuing the **operating business at approximately ₹0** — or even negative.\n\nYet the operating business:\n- Revenue: ₹1,196 Cr TTM\n- Operating profit: ~₹250 Cr (21% OPM)\n- FCF: ₹489 Cr (FY24)\n- Growing slowly but profitable and cash-generative\n\n**You are being offered a profitable, cash-generating business for free.**\n\n### SOTP Valuation\n\n| Component | Valuation Method | Value (₹ Cr) | Per Share |\n|-----------|-----------------|-------------|-----------|\n| Investment portfolio | At market value (liquid) | ₹4,608 Cr | ₹542 |\n| Operating business (bear) | 8x operating profit (₹250 Cr) | ₹2,000 Cr | ₹235 |\n| Operating business (base) | 12x operating profit | ₹3,000 Cr | ₹353 |\n| Operating business (bull) | 18x (Reliance re-rates it) | ₹4,500 Cr | ₹529 |\n\n| Scenario | Total Value | Per Share | vs ₹526 |\n|----------|-------------|-----------|---------|\n| Bear (8x ops) | ₹6,608 Cr | **₹777** | **+48%** |\n| Base (12x ops) | ₹7,608 Cr | **₹895** | **+70%** |\n| Bull (18x, Reliance integration) | ₹9,108 Cr | **₹1,071** | **+104%** |\n\n**Even in the bear case, there is 48% upside.** The floor is the investment portfolio itself.\n\n---\n\n## 4. Key Metrics\n\n### Annual P&L\n\n| Year | Revenue (₹ Cr) | OPM% | Net Profit (₹ Cr) | EPS (₹) |\n|------|---------------|------|------------------|--------|\n| FY19 | 892 | 26% | 207 | ₹41.96 |\n| FY20 | 953 | 29% | 272 | ₹34.61 |\n| FY21 | 675 | 23% | 214 | ₹8.47 |\n| FY22 | 647 | 0% | 71 | ₹19.30 |\n| FY23 | 845 | 10% | 163 | ₹42.68 |\n| FY24 | 1,043 | 21% | 363 | — |\n\nFY22 was COVID trough. Recovery since then. OPM restored to 21%.\n\n### Recent Quarterly Trend\n\n| Quarter | Revenue (₹ Cr) | Net Profit (₹ Cr) | OPM% |\n|---------|---------------|------------------|-----|\n| Dec 2023 | 265 | 92 | 23% |\n| Mar 2024 | 270 | 116 | 26% |\n| Sep 2024 | 261 | 72 | 19% |\n| Dec 2025 | 305.7 | 118 | — |\n\nRevenue and profit growing, not declining. Q3 FY26 (Dec 2025) = best revenue quarter in company history.\n\n### Shareholding — Smart Money Buying\n\n| Category | Dec 2023 | Sep 2024 | Trend |\n|----------|----------|----------|-------|\n| Promoters (Reliance) | 74.31% | 74.15% | Stable |\n| FIIs | 4.87% | **7.82%** | **+2.95% — buying** |\n| DIIs | 8.89% | 8.37% | Stable |\n\nFIIs have added nearly 3% of the company in 9 months. That\'s ₹500-600 Cr of buying. They see the same SOTP opportunity.\n\n### Cash Flow\n\n| Year | CFO (₹ Cr) | Capex (₹ Cr) | FCF (₹ Cr) |\n|------|-----------|-------------|-----------|\n| FY22 | 39 | — | — |\n| FY23 | 179 | — | 342 |\n| FY24 | 259 | — | **489** |\n\nFCF growing strongly — the business is converting earnings to cash well.\n\n---\n\n## 5. Why is it at ₹526? — Understanding the Bear Case\n\n**Bear argument 1: Google is killing local search**\nGoogle Maps and "near me" searches have displaced much of Just Dial\'s use case. Users don\'t need a separate app to find a plumber — they just Google it. This is real and explains the slow revenue growth.\n\n**Counter:** Just Dial\'s strength is in Tier 2-3 cities where Google\'s local business data is sparse. 30M+ business listings built over 25 years are hard to replicate. And Reliance has deeper reach into these markets.\n\n**Bear argument 2: Low ROE (3.63%)**\nThe ROE looks terrible because the denominator (equity) includes ₹4,608 Cr of investments earning modest returns. Strip that out:\n- Operating equity: ₹4,023 Cr - ₹4,608 Cr investments = negative (the entire equity IS the cash pile)\n- The operating business is run on essentially zero equity → infinite operating ROE\n- The low reported ROE is a feature of having too much cash, not operational weakness\n\n**Bear argument 3: Reliance hasn\'t done anything with it**\n3 years since acquisition and Just Dial isn\'t deeply integrated into JioMart. Fair point — execution has been slow.\n\n**Counter:** Reliance does things on their own timeline. When they integrate, re-rating could be sharp and sudden.\n\n---\n\n## 6. The Reliance Angle\n\nThis is underappreciated. Reliance\'s strategy in local commerce (JioMart neighbourhood stores, JioBusiness) requires a business discovery layer. Just Dial\'s 30M+ listing database + local SME relationships + 250+ city presence is exactly that infrastructure. Possible catalysts:\n- JioBusiness integrated with Just Dial listings\n- Just Dial becomes the onboarding/CRM layer for local merchants on JioMart\n- Reliance monetises the SME relationships through lending (Jio Financial Services)\n\nIf any of this happens, revenue growth could re-accelerate and the multiple re-rates from 8x to 20x+ overnight.\n\n---\n\n## 7. Risks\n\n| Risk | Probability | Impact |\n|------|-------------|--------|\n| Google/Jio continue eroding search use case | High | Medium — but SOTP floor protects |\n| Reliance delays integration indefinitely | Medium | Medium — stock stays cheap longer |\n| Revenue turns negative (structural decline) | Low near-term | High — would impair operating value |\n| Reliance delist / takes private at low price | Low | Medium — could happen at a discount |\n| Investment portfolio value declines (market crash) | Medium | High — would shrink the SOTP floor |\n\n---\n\n## 8. Entry Strategy\n\nThe SOTP floor (investment portfolio alone = ₹542/share) is very close to current price ₹526. That creates an asymmetric bet:\n\n**Downside:** Limited. Investment portfolio is liquid (MFs, bonds). Worst case = stock falls to ₹400-450 if markets sell off, dragging investment portfolio value down.\n\n**Upside:** 60-104% if operating business gets any meaningful re-rating (Reliance integration, or simply market recognising the undervaluation).\n\n**Suggested approach:**\n- Buy in two tranches: 50% now at ₹526 (near 52-week low of ₹509)\n- Add remaining 50% if it falls to ₹450-475 (a gift if it happens)\n- Target: ₹800-900 (base case SOTP) over 12-18 months\n\n---\n\n## 9. Exit Triggers\n\n- [ ] Revenue declines YoY for 2 consecutive quarters (structural decline confirmed → exit)\n- [ ] Investment portfolio value declines to below ₹3,500 Cr (SOTP floor collapses)\n- [ ] Reliance delists at a price below SOTP fair value → fight it legally or exit\n- [ ] Better margin of safety opportunity appears with same capital\n- [ ] Target hit: ₹900+ (base case realised) → review whether to hold for bull case\n\n---\n\n## 10. Research Log\n\n### 2026-03-12 — Initial thesis\n- Classic SOTP value play: market cap (₹4,473 Cr) ≈ investment portfolio (₹4,608 Cr) → operating business mispriced at zero\n- P/E 7.8x, P/B 0.92x (below book), 46% net margin (includes investment income), near-zero debt\n- Promoter is Reliance Industries at 74%+ — strongest possible backing, not a promoter pledging story\n- FIIs added ~3% of company in 9 months → institutional validation of the thesis\n- Bear case still 48% upside from here (8x operating business + investment portfolio)\n- Risk: Slow revenue growth (6.4%) reflects structural Google/Jio pressure on local search\n- Verdict: BUY in 2 tranches. ₹526 first tranche, ₹450-475 if it dips. Target ₹800-900.\n- Quality Score: 17/25 (Grade B). Strong financials and valuation offset weak growth runway.\n');
