<script>document.getElementById("c").innerHTML=marked.parse('# Integrated Industries Ltd (BSE: 531889) — Investment Thesis\n\n**Status:** WATCHLIST (not owned — investigating)\n**Quality Score:** 13/25 (Grade C+: Watch — earnings quality concerns)\n**Last Updated:** 2026-03-12\n**Data Source:** Screener.in (consolidated)\n\n---\n\n## 1. Business Summary\n\nA formerly dormant holding company shell that transformed overnight into a food products company via acquisition. In FY23/24, it acquired Nurture Well Food Limited — a biscuit manufacturing plant producing brands Richlite, Funtreat, and Crunchy Craze. Also trades organic/inorganic food products and processed food items.\n\n**The transformation:** ₹5 Cr revenue (FY23) → ₹1,067 Cr TTM. This is a 200x jump driven entirely by the acquisition, not organic growth.\n\n**Listed on:** BSE only (not NSE). Low liquidity. Hard to exit in size.\n\n---\n\n## 2. Quality Score\n\n| Dimension | Score (1-5) | Notes |\n|-----------|-------------|-------|\n| MOAT | 1 | Biscuit brands (Richlite, Funtreat, Crunchy Craze) are unknown. Parle, Britannia, ITC own India\'s biscuit shelf space and distribution. No pricing power, no brand moat. May be B2B/private label supplier — which is even weaker. |\n| Management | 2 | Promoter diluted from 75% → 52% in FY24 (warrant allotment to raise capital). Warrants at ₹28.25 announced Feb 2026. Capital raising is necessary but 23% dilution is significant. Related party disclosures vague. |\n| Financials | 3 | ROE 27.5%, ROCE 30.5%, nearly debt-free — surface numbers are excellent. But: FCF deeply negative (FY25: -₹81 Cr), 3% effective tax rate (artificial), 760 days payable (extreme, suspicious). |\n| Growth Runway | 3 | Revenue trajectory is real (₹766 Cr FY25 → ₹1,067 Cr TTM). But it\'s acquired growth + trading. Biscuit market itself is competitive, not high-growth. |\n| Valuation | 4 | P/E 11.3x is genuinely cheap for food sector (Britannia trades 50x, Parle is private). IF earnings are real and tax rate normalizes, this is undervalued. |\n| **Total** | **13/25** | **Grade C+: Watch — 3 open questions before buying** |\n\n---\n\n## 3. The Three Open Questions\n\n### Question 1: Why is the tax rate 3%? (Critical)\n\n| Year | PBT | Tax | Effective Rate |\n|------|-----|-----|----------------|\n| FY23 | ₹5 Cr | ₹3.65 Cr | **73%** (normal) |\n| FY24 | ₹27 Cr | ₹1.89 Cr | **7%** (suspicious) |\n| FY25 | ₹68 Cr | ₹2.04 Cr | **3%** (very suspicious) |\n\nThe rate drops exactly when revenue explodes. Two explanations:\n\n**Benign:** The acquired biscuit unit (Nurture Well Food) had large accumulated losses from its prior loss-making years. Indian tax law allows set-off of brought-forward losses against current profits (Section 72). If ₹200-300 Cr of losses exist in the acquired entity, the tax shield could last 3-5 more years.\n\n**Concerning:** The ₹68 Cr "profit" includes inflated revenue from related-party trading that is circular — recognising revenue without real economic substance, with the tax payment being deferred or avoided via creative accounting.\n\n**How to verify:** Annual report → Note on Deferred Tax Assets and Brought Forward Losses schedule. If there\'s a DTA of ₹50-100 Cr on the balance sheet — benign. If there\'s no DTA and no explanation — red flag.\n\n**Impact when tax normalises:** At 25% tax rate, FY25 PAT would be ₹51 Cr (not ₹67 Cr). P/E re-rates from 11.3x to 19x. Still cheap, but less so.\n\n---\n\n### Question 2: Why are payable days 760? (Very Concerning)\n\nNormal food companies: 30-90 days payable.\nIntegrated Industries: **760 days payable** (FY25).\n\nThis means the company is not paying its suppliers for over 2 years. There are two interpretations:\n\n**Benign:** The "trading" part of the business — if they\'re a distributor/aggregator for food products, they may have very long credit from large principals (like a consignment model where they only pay when they sell). Some agri-commodity traders operate this way.\n\n**Concerning:** Related-party payables that are never actually paid — circular transactions where a subsidiary "supplies" goods, the parent records revenue, but the payable never settles. This is a classic small-cap fraud structure in India.\n\n**How to verify:** Annual report → Related Party Transactions note. If the 760-day creditor is a single related party entity — exit immediately. If it\'s spread across multiple unrelated suppliers — benign.\n\n---\n\n### Question 3: FCF is deeply negative despite "profits" (Important)\n\n| Year | Net Profit | Operating CFO | Capex | FCF |\n|------|-----------|---------------|-------|-----|\n| FY23 | ₹1 Cr | ₹5 Cr | ₹1 Cr | ₹4 Cr |\n| FY24 | ₹25 Cr | **-₹41 Cr** | ₹75 Cr | **-₹116 Cr** |\n| FY25 | ₹67 Cr | ₹48 Cr | ₹129 Cr | **-₹81 Cr** |\n\nIn FY25: profits ₹67 Cr, but FCF is -₹81 Cr. The company spent ₹129 Cr on capex (expanding the biscuit facility?) while generating only ₹48 Cr from operations.\n\n**Financing bridge:** They raised ₹87 Cr through financing (warrants, borrowings) to cover the gap. This is sustainable only if the capex is creating earnings-generating assets. If the capex is real factory expansion — this is fine, growth capex is expected. If it\'s not verifiable — concerning.\n\n---\n\n## 4. Key Metrics\n\n### Annual P&L\n\n| Year | Revenue (₹ Cr) | Net Profit (₹ Cr) | OPM% | EPS |\n|------|---------------|------------------|------|-----|\n| FY22 | ~5 | ~1 | — | ₹0.14 |\n| FY23 | ~5 | ~1 | — | ₹0.14 |\n| FY24 | 331 | 25 | ~8% | ₹1.30 |\n| FY25 | 766 | 67 | ~9% | ₹2.43 |\n| TTM | 1,067 | 108 | ~10% | ~₹3.80 |\n\n### Quarterly Trend\n\n| Quarter | Revenue (₹ Cr) | Net Profit (₹ Cr) | OPM% |\n|---------|---------------|------------------|------|\n| Jun 2024 | 140 | 13 | 10% |\n| Sep 2024 | 187 | 14 | 8% |\n| Dec 2024 | 199 | 16 | 8% |\n| Mar 2025 | 240 | 23 | 9% |\n\nTrend is up and consistent — each quarter better than last. This is reassuring.\n\n### Balance Sheet (FY25)\n\n| Item | Value |\n|------|-------|\n| Market Cap | ₹984 Cr |\n| Book Value/share | ₹13.2 |\n| P/B | 3.2x |\n| Debt | ₹2 Cr (nearly debt-free) |\n| ROE | 27.5% |\n| ROCE | 30.5% |\n\n### Shareholding\n\n| Category | Mar 2022 | Mar 2024 | Dec 2025 |\n|----------|----------|----------|----------|\n| Promoters | 75% | 52.31% | 53.81% |\n| FIIs | — | — | 0.32% |\n| DIIs | — | — | 0.07% |\n| Public | 25% | 47.69% | 45.80% |\n\nPromoter drop from 75% → 52% in FY24 was warrant-based capital raise (not open market selling). Slight recovery to 53.81% suggests warrants being converted. **No institutional ownership** — DIIs + FIIs combined only 0.39%. This is a completely undiscovered company.\n\n---\n\n## 5. The Bull Case (If Questions Are Answered Satisfactorily)\n\nIf the annual report shows:\n1. Large carried-forward losses in Nurture Well Food justifying 3% tax\n2. 760-day payable is from unrelated agri-commodity suppliers (trading model)\n3. ₹129 Cr capex is real factory expansion (verifiable from fixed asset schedule)\n\nThen this is genuinely interesting:\n- P/E 11.3x on TTM earnings (19x on tax-normalised) — cheap for food\n- ROCE 30% debt-free — Munger quality metric\n- Quarterly momentum improving\n- No institutional ownership = no crowding, discovery ahead\n- TTM revenue ₹1,067 Cr growing → ₹1,500 Cr FY27 possible\n\n**SOTP at tax-normalised earnings:**\n- TTM normalised PAT: ₹51 Cr (at 25% tax)\n- At 20x P/E (food sector discount for small/unknown brand): ₹1,020 Cr market cap = ₹44/share\n- At 25x P/E (if Britannia-type re-rating): ₹1,275 Cr = ₹55/share (+30%)\n- At 15x (risk discount): ₹765 Cr = ₹33/share (-22% downside)\n\n**The upside is moderate (+30% base) unless revenue compounds to ₹2,000+ Cr** — at which point 25x P/E on ₹150+ Cr profit = ₹3,750 Cr market cap = ₹160/share (+280%). That\'s the bull case in 3 years.\n\n---\n\n## 6. The Bear Case (If Questions Raise More Red Flags)\n\nThe 760-day payable + 3% tax + related-party vagueness + BSE-only listing is the exact template for a small-cap accounting fraud in India. Companies like Ruchi Soya, Vakrangee, Manpasand Beverages all had:\n- Explosive revenue growth via acquisition\n- Low/zero tax rates\n- Inflated receivables or payables via related parties\n- No institutional ownership\n\n**Not saying this is a fraud** — but the checklist overlap is enough to require annual report verification before committing capital.\n\n---\n\n## 7. Entry Strategy\n\n**Do not buy before verifying the annual report.**\n\n**Step 1 (This week):** Download FY25 Annual Report from BSE → check:\n- [ ] Note on Deferred Tax Assets / Brought Forward Losses\n- [ ] Related Party Transactions — who are the creditors with 760-day payable?\n- [ ] Fixed Assets schedule — is the ₹129 Cr capex reflected in actual plant/machinery addition?\n- [ ] Auditor name and whether they flagged any concerns\n\n**Step 2 (If clean):** Buy in small tranche at ₹40-43 (current). Target: ₹60-70 in 12-18 months (base case). Stop: exit if next quarter shows revenue decline or OPM below 7%.\n\n**Position sizing:** Max 2-3% of portfolio given BSE-only liquidity and unresolved questions.\n\n---\n\n## 8. Exit Triggers\n\n- [ ] Annual report shows related-party creditor as majority of 760-day payable → EXIT immediately\n- [ ] Tax rate jumps to 25%+ in FY26 → re-rate earnings down, reassess\n- [ ] Revenue declines QoQ for 2 consecutive quarters\n- [ ] Auditor raises going concern / qualified opinion\n- [ ] Promoter selling in open market (different from warrant allotment)\n\n---\n\n## 9. Research Log\n\n### 2026-03-12 — Initial thesis\n- Identified via Screener.in BSE: 531889 link from user\n- Revenue exploded ₹5 Cr → ₹1,067 Cr TTM via biscuit plant acquisition (Nurture Well Food)\n- Three open questions: 3% tax rate, 760-day payable, FCF deeply negative\n- Tax: likely carry-forward losses from acquired entity — verifiable from annual report DTA note\n- Payable: could be agri-commodity trading model OR related-party circular — critical to verify\n- Surface metrics attractive: P/E 11.3x, ROCE 30%, debt-free, quarterly momentum improving\n- No institutional ownership (FIIs + DIIs = 0.39%) — completely undiscovered\n- Grade C+ 13/25. Action: Annual report review before any buy decision.\n')</script></html>
